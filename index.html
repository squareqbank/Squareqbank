<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Square QBank</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900&family=JetBrains+Mono:wght@500;600;700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#eceef2;--surface:#ffffff;--surface2:#f6f7f9;--surface3:#eef1f5;
  --text:#0f1118;--muted:#646e7e;--faint:#9aa3b1;--border:#e4e7ec;--border2:#eef0f3;
  --blue:#2767e0;--blue-ink:#1b4fb0;--blue-soft:#e8f0fd;
  --yellow:#f3b827;--yellow-ink:#a87b07;--yellow-soft:#fdf3d6;
  --green:#16a36a;--green-soft:#e4f6ee;--red:#df3b3b;--red-soft:#fbe9e9;
  --shadow:0 1px 2px rgba(16,20,30,.04),0 4px 16px rgba(16,20,30,.05);
  --shadow-lg:0 10px 44px rgba(16,20,30,.14);
}
[data-theme="dark"]{
  --bg:#090a0e;--surface:#14161d;--surface2:#1a1d26;--surface3:#21252f;
  --text:#eef0f4;--muted:#9aa3b2;--faint:#6b7383;--border:#272b36;--border2:#1d212b;
  --blue:#5a8df6;--blue-ink:#85aefb;--blue-soft:#16233d;
  --yellow:#f3c24a;--yellow-ink:#f3c24a;--yellow-soft:#2c2614;
  --green:#34c98a;--green-soft:#11301f;--red:#f06868;--red-soft:#341819;
  --shadow:0 1px 2px rgba(0,0,0,.35),0 6px 22px rgba(0,0,0,.4);
  --shadow-lg:0 14px 54px rgba(0,0,0,.6);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
::selection{background:var(--blue);color:#fff}
.ms{font-family:'Material Symbols Rounded';font-weight:normal;font-style:normal;line-height:1;display:inline-block;white-space:nowrap;direction:ltr;-webkit-font-smoothing:antialiased;-webkit-font-feature-settings:'liga'}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px;border:2px solid transparent;background-clip:content-box}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes pop{from{opacity:0;transform:scale(.98)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
.mobile-only{display:none!important}
@media(max-width:1120px){.grid-4{grid-template-columns:repeat(2,1fr)!important}}
@media(max-width:900px){
  .app-sidebar{position:fixed!important;top:auto!important;bottom:0!important;left:0!important;right:0!important;width:100%!important;height:60px!important;flex-direction:row!important;padding:0 6px!important;border-right:none!important;border-top:1px solid var(--border)!important;z-index:40}
  .brand-row{display:none!important}.side-foot{display:none!important}
  .app-nav{flex-direction:row!important;width:100%!important;justify-content:space-around!important;gap:0!important}
  .nav-btn{flex-direction:column!important;height:auto!important;gap:2px!important;padding:5px 4px!important;width:auto!important;margin:0!important}
  .nav-label{font-size:10px!important;font-weight:600}
  .nav-btn .ms{font-size:23px!important}
  .app-main{padding-bottom:60px!important}
  .content-pad{padding:18px!important}
  .header-search{display:none!important}
  .mobile-only{display:flex!important}
  .grid-3{grid-template-columns:1fr!important}
  .grid-2{grid-template-columns:1fr!important}
  .grid-4{grid-template-columns:repeat(2,1fr)!important}
  .mode-grid{grid-template-columns:1fr!important}
  .an-grid{grid-template-columns:1fr!important}
  .results-hero{flex-direction:column!important;text-align:center;gap:18px!important}
  .login-grid{grid-template-columns:1fr!important}
  .login-hero{display:none!important}
  .app-header{padding:0 18px!important}
  .rlabel{display:none!important}
}
@media(max-width:520px){.grid-4{grid-template-columns:1fr 1fr!important}}
button{font-family:Figtree,sans-serif}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ── Supabase ── */
const SUPABASE_URL  = 'https://dxpempiqkdemoluscxee.supabase.co';
const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR4cGVtcGlxa2RlbW9sdXNjeGVlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MDAzMDQsImV4cCI6MjA5NzM3NjMwNH0.WEZnUgnhi0UZrkkijcfaLqu_VcVzSlaxmoOodHUHt4A';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* device fingerprint (stable across reloads) */
function getDeviceFP(){
  const nav = [navigator.userAgent, navigator.language, screen.width+'x'+screen.height, new Date().getTimezoneOffset()].join('|');
  let h=0; for(let i=0;i<nav.length;i++){h=Math.imul(31,h)+nav.charCodeAt(i)|0;} return 'fp_'+(h>>>0).toString(36);
}

/* ── state ── */
const S = {
  theme:'light', screen:'login', role:'user',
  profile:null,          // {id, username, full_name, role, stage}
  dbQuestions:[],        // questions loaded from Supabase
  dbSubjects:[],         // subjects loaded from Supabase
  dbLectures:[],         // lectures loaded from Supabase
  dbUsers:[],            // admin: students list
  activeSessionId:null,  // current session UUID
  deviceStatus:'ok',     // 'ok' | 'registered' | 'locked'
  authError:'', loginLoading:false,
  subjectId:'', lectureId:'', lectureName:'',
  sessionSubject:'', sessionLecture:'',
  mode:'study', queue:[], qPos:0,
  answers:{}, flags:{}, examLeft:1500,
  dbSessions:[],                 // current user's sessions (real stats/analytics)
  dbQuestionCount:0,             // admin: total questions in the bank
  testScope:null,                // {type:'lecture'|'subject', lectureIds:[], label, subjectName}
  selectedLectures:{},           // lectureId -> true (subject-test lecture picker)
  practiceError:'',              // shown when a lecture/subject has no questions yet
  adminTab:'users',
  showCreateModal:false, createError:'', createLoading:false,
  showBulkModal:false, bulkText:'', bulkResults:[], bulkLoading:false,
};

let _timerInterval = null;

/* ── data ── */
function subjectsData(){
  if(S.dbSubjects.length){
    return S.dbSubjects.map(s=>{
      const lecs=S.dbLectures.filter(l=>l.subject_id===s.id);
      return {id:s.id,name:s.name,hue:s.hue,category:s.category||s.name,lectures:lecs.length||0,q:0,pct:0,acc:0};
    });
  }
  return[];
}

function subjectsByCategory(){
  const all=subjectsData();
  const order=['Medicine','Surgery','ENT','Ophthalmology','Orthopedics','Gynaecology','Psychiatry','Pediatric','Dermatology','Medical Ethics'];
  const map={};
  all.forEach(s=>{
    const cat=s.category||s.name;
    if(!map[cat]) map[cat]=[];
    map[cat].push(s);
  });
  const result=[];
  order.forEach(cat=>{if(map[cat]) result.push({cat,subjects:map[cat]});});
  Object.keys(map).forEach(cat=>{if(!order.includes(cat)) result.push({cat,subjects:map[cat]});});
  return result;
}

function lecturesFor(id){
  if(S.dbLectures.length){
    return S.dbLectures
      .filter(l=>l.subject_id===id)
      .sort((a,b)=>a.sort_order-b.sort_order)
      .map(l=>({id:l.id,name:l.name,q:0,pct:0,acc:0}));
  }
  return [];
}

function questions(){
  // Real questions from Supabase, mapped to the app's shape.
  // Empty until MCQs are added to the bank — the UI shows honest empty states.
  return S.dbQuestions.map(q=>({
    id: q.id,
    tag: q.tag || q.lecture_id,
    stem: q.stem,
    image: q.image_url||'',
    // keep only the options that were actually filled in (True/False
    // questions store just A & B; the trailing C–E are left empty).
    options:[q.option_a,q.option_b,q.option_c,q.option_d,q.option_e]
      .filter(o=>o!=null && (''+o).trim()!==''),
    answer: q.answer,
    explanation: q.explanation||'',
  }));
}

/* ── helpers ── */
function fmt(n){return (''+n).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function tile(hue){
  return S.theme==='dark'
    ?{bg:'oklch(0.30 0.055 '+hue+')',fg:'oklch(0.80 0.12 '+hue+')'}
    :{bg:'oklch(0.95 0.045 '+hue+')',fg:'oklch(0.52 0.14 '+hue+')'};
}
function curQ(){const qs=questions();return qs[S.queue[S.qPos]]||qs[0];}

/* real per-user stats derived from loaded sessions */
function userStats(){
  const ss=S.dbSessions||[];
  const answered=ss.reduce((n,s)=>n+(s.answered||0),0);
  const correct=ss.reduce((n,s)=>n+(s.correct||0),0);
  const completed=ss.filter(s=>s.status==='completed').length;
  const weekAgo=Date.now()-7*864e5;
  const weekAnswered=ss.filter(s=>new Date(s.started_at).getTime()>=weekAgo).reduce((n,s)=>n+(s.answered||0),0);
  const flagged=Object.keys(S.flags||{}).filter(k=>S.flags[k]).length;
  return {answered,correct,completed,weekAnswered,flagged,accuracy:answered?Math.round(correct/answered*100):null,sessions:ss.length};
}

/* ── actions ── */
function setState(patch){
  if(typeof patch==='function') patch=patch(S);
  Object.assign(S,patch);
  render();
}

window.Q={
  go(k){setState({screen:k==='subjects'?'subjects':k==='analytics'?'analytics':k==='admin'?'admin':'dashboard'});},
  goDashboard(){setState({screen:'dashboard'});},
  goSubjects(){setState({screen:'subjects'});},
  openSubject(id){setState({subjectId:id,screen:'lectures',selectedLectures:{},practiceError:''});},
  openLecture(id,name){
    const subj=subjectsData().find(s=>s.id===S.subjectId);
    setState({lectureId:id,lectureName:name,practiceError:'',
      testScope:{type:'lecture',lectureIds:[id],label:name,subjectName:subj?subj.name:''},
      screen:'modeselect'});
  },
  onBackToLectures(){setState({screen:'lectures'});},
  toggleLecture(id){const sel={...S.selectedLectures};sel[id]?delete sel[id]:sel[id]=true;setState({selectedLectures:sel});},
  selectAllLectures(){const sel={};lecturesFor(S.subjectId).forEach(l=>sel[l.id]=true);setState({selectedLectures:sel});},
  clearLectureSelection(){setState({selectedLectures:{}});},
  startSubjectTest(){
    const subj=subjectsData().find(s=>s.id===S.subjectId);
    const all=lecturesFor(S.subjectId);
    const picked=Object.keys(S.selectedLectures).filter(k=>S.selectedLectures[k]);
    const ids=picked.length?picked:all.map(l=>l.id);
    if(!ids.length)return;
    const label=picked.length&&picked.length<all.length
      ? `${subj?subj.name:'Subject'} · ${ids.length} lectures`
      : `All of ${subj?subj.name:'this subject'}`;
    setState({testScope:{type:'subject',lectureIds:ids,label,subjectName:subj?subj.name:''},
      lectureName:label,practiceError:'',screen:'modeselect'});
  },
  async onLogin(){
    const usernameEl = document.getElementById('login-username');
    const passwordEl = document.getElementById('login-password');
    const username   = usernameEl ? usernameEl.value.trim() : '';
    const password   = passwordEl ? passwordEl.value : '';
    if(!username || !password){ setState({authError:'Enter username and password.'}); return; }
    setState({authError:'', loginLoading:true});
    try {
      const email = username + '@squareqbank.local';
      const {data, error} = await sb.auth.signInWithPassword({email, password});
      if(error){ setState({authError:'Invalid username or password.', loginLoading:false}); return; }
      await DB.afterLogin(data.user);
    } catch(e) {
      setState({authError:'Connection error. Please try again.', loginLoading:false});
    }
  },
  async onGuest(){
    setState({screen:'dashboard',role:'guest',profile:null,answers:{},flags:{},qPos:0,authError:'',
      dbSessions:[],dbUsers:[],dbQuestions:[],dbQuestionCount:0,selectedLectures:{},testScope:null,practiceError:''});
    await DB.loadSubjectsAndLectures();   // anon RLS returns Medical Ethics only
  },
  async onLogout(){
    if(S.role!=='guest') await sb.auth.signOut();
    setState({screen:'login',role:'user',profile:null,answers:{},flags:{},qPos:0,activeSessionId:null,authError:'',dbQuestions:[],dbUsers:[],dbSessions:[],testScope:null,selectedLectures:{},practiceError:''});
  },
  onToggleTheme(){setState({theme:S.theme==='light'?'dark':'light'});},
  onReviewWrong(){
    const qs=questions();
    const wrong=qs.map((q,i)=>({q,i})).filter(x=>{const a=S.answers[x.q.id];return a!==undefined&&a!==x.q.answer;}).map(x=>x.i);
    if(!wrong.length)return;
    setState({mode:'study',queue:wrong,qPos:0,activeSessionId:null,
      sessionSubject:'Review',sessionLecture:'Incorrect questions',screen:'solver'});
  },
  onReviewFlagged(){
    const qs=questions();
    const fl=qs.map((q,i)=>({q,i})).filter(x=>S.flags[x.q.id]).map(x=>x.i);
    if(!fl.length)return;
    setState({mode:'study',queue:fl,qPos:0,activeSessionId:null,
      sessionSubject:'Review',sessionLecture:'Flagged questions',screen:'solver'});
  },
  async openFlagged(){
    const ids=Object.keys(S.flags).filter(k=>S.flags[k]);
    if(!ids.length){ setState({screen:'subjects'}); return; }   // nothing flagged → browse
    const {data}=await sb.from('questions').select('*').eq('is_active',true).in('id',ids);
    setState({dbQuestions:data||[]});
    const qs=questions();
    if(!qs.length){ setState({screen:'subjects'}); return; }
    setState({mode:'study',queue:qs.map((_,i)=>i),qPos:0,activeSessionId:null,
      sessionSubject:'Review',sessionLecture:'Flagged questions',screen:'solver'});
  },
  async startSession(mode){
    const scope=S.testScope||{type:'lecture',lectureIds:S.lectureId?[S.lectureId]:[],label:S.lectureName};
    const subj=subjectsData().find(s=>s.id===S.subjectId);
    const subjName=subj?subj.name:'';
    // load the real questions for this scope (one or many lectures).
    // Guests use the anon key — RLS limits them to Medical Ethics questions.
    await DB.loadQuestionsForLectures(scope.lectureIds);
    const qs=questions();
    if(!qs.length){ setState({practiceError:'No questions in this selection yet — they’ll appear here once added to the bank.'}); return; }
    const queue=qs.map((_,i)=>i);
    if(mode==='exam') queue.sort(()=>Math.random()-0.5);
    const lectureForSession = scope.type==='lecture' ? scope.lectureIds[0] : null;
    const sessionId=await DB.startSession(mode, scope.label, lectureForSession, S.subjectId, qs.length);
    setState({mode,queue,qPos:0,answers:{},examLeft:mode==='exam'?Math.max(600,qs.length*60):1500,
      sessionSubject:subjName,sessionLecture:scope.label,
      activeSessionId:sessionId,screen:'solver'});
  },
  onStartStudy(){Q.startSession('study');},
  onStartExam(){Q.startSession('exam');},
  onRetry(){Q.startSession('study');},
  onExitSolver(){setState({screen:S.subjectId?'modeselect':'dashboard'});},
  onFinish(){DB.completeSession();setState({screen:'results'});},
  choose(i){
    const q=curQ();const a={...S.answers};
    if(S.mode==='study'&&a[q.id]!==undefined)return;
    a[q.id]=i;setState({answers:a});
  },
  next(){setState(s=>({qPos:Math.min(s.queue.length-1,s.qPos+1)}));},
  prev(){setState(s=>({qPos:Math.max(0,s.qPos-1)}));},
  setQPos(i){setState({qPos:i});},
  onFlag(){const q=curQ();const f={...S.flags};f[q.id]=!f[q.id];setState({flags:f});DB.toggleFlag(q.id);},
  setAdminTab(k){setState({adminTab:k});},
  openCreateModal(){setState({showCreateModal:true,createError:'',createLoading:false});},
  closeCreateModal(){setState({showCreateModal:false,createError:'',createLoading:false});},
  async onCreateStudent(){
    const u=document.getElementById('cu-username')?.value.trim();
    const n=document.getElementById('cu-fullname')?.value.trim();
    const p=document.getElementById('cu-password')?.value;
    const s=parseInt(document.getElementById('cu-stage')?.value||'5');
    if(!u||!n||!p){setState({createError:'All fields required.'});return;}
    setState({createLoading:true,createError:''});
    const res=await DB.createStudent(u,n,p,s);
    if(res.error){setState({createLoading:false,createError:res.error});return;}
    setState({showCreateModal:false,createLoading:false,createError:''});
  },
  openBulkModal(){setState({showBulkModal:true,bulkText:'',bulkResults:[],bulkLoading:false});},
  closeBulkModal(){setState({showBulkModal:false,bulkText:'',bulkResults:[],bulkLoading:false});},
  async resetDevice(userId){await DB.resetDevice(userId);},
  async onBulkCreate(){
    const raw=document.getElementById('bulk-csv')?.value.trim();
    if(!raw){return;}
    // parse lines: username,full name,password,stage(optional)
    const rows=raw.split('\n').map(l=>l.trim()).filter(l=>l&&!l.startsWith('#'));
    const students=rows.map(l=>{const[username,full_name,password,stage]=l.split(',').map(x=>x?.trim());return{username,full_name,password,stage:parseInt(stage)||5};}).filter(r=>r.username&&r.full_name&&r.password);
    if(!students.length){return;}
    setState({bulkLoading:true,bulkResults:[]});
    const {data,error}=await sb.rpc('admin_create_students',{p_students:students});
    if(error){setState({bulkLoading:false,bulkResults:[{username:'Error',status:'error',error:error.message}]});return;}
    await DB.loadUsers();
    setState({bulkLoading:false,bulkResults:data||[]});
  },
};

/* ── DB layer ── */
const DB = {

  async afterLogin(user){
    const {data:prof, error:profErr} = await sb.from('profiles').select('*').eq('id', user.id).single();
    if(profErr || !prof){ setState({authError:'Profile not found. Contact administrator.', loginLoading:false}); await sb.auth.signOut(); return; }
    if(!prof.is_active){ setState({authError:'Account is deactivated. Contact administrator.', loginLoading:false}); await sb.auth.signOut(); return; }

    // device lock check (non-fatal — if it errors, continue).
    // Admins are exempt: they manage from multiple devices.
    if(prof.role !== 'admin'){
      try {
        const fp = getDeviceFP();
        const {data:devRes} = await sb.rpc('lock_device', {p_fp: fp});
        if(devRes?.status === 'locked'){
          await sb.auth.signOut();
          setState({authError:'This account is locked to another device. Contact your administrator to reset.', loginLoading:false});
          return;
        }
      } catch(_){}
    }

    // load data in parallel — failures are non-fatal
    await Promise.allSettled([
      DB.loadSubjectsAndLectures(),
      DB.loadSessions(user.id),
      DB.loadFlags(user.id),
      prof.role === 'admin' ? DB.loadUsers() : Promise.resolve(),
      prof.role === 'admin' ? DB.loadQuestionCount() : Promise.resolve(),
    ]);

    setState({
      profile: prof,
      role: prof.role === 'admin' ? 'admin' : 'user',
      screen: 'dashboard',
      loginLoading: false,
      answers:{}, flags: S.flags, qPos:0, authError:'',
    });
  },

  async loadSubjectsAndLectures(){
    const {data:subjects} = await sb.from('subjects').select('*').order('sort_order');
    const {data:lectures} = await sb.from('lectures').select('*').order('sort_order');
    setState({dbSubjects: subjects||[], dbLectures: lectures||[]});
  },

  async loadQuestions(lectureId){
    let q = sb.from('questions').select('*').eq('is_active', true);
    if(lectureId) q = q.eq('lecture_id', lectureId);
    const {data} = await q.order('created_at');
    setState({dbQuestions: data||[]});
  },

  async loadQuestionsForLectures(lectureIds){
    const ids=(lectureIds||[]).filter(Boolean);
    if(!ids.length){ setState({dbQuestions: []}); return; }
    const {data} = await sb.from('questions').select('*')
      .eq('is_active', true).in('lecture_id', ids).order('created_at');
    setState({dbQuestions: data||[]});
  },

  async loadSessions(userId){
    const {data} = await sb.from('sessions').select('*')
      .eq('user_id', userId).order('started_at', {ascending:false});
    setState({dbSessions: data||[]});
  },

  async loadQuestionCount(){
    const {count} = await sb.from('questions').select('id', {count:'exact', head:true}).eq('is_active', true);
    setState({dbQuestionCount: count||0});
  },

  async loadFlags(userId){
    const {data} = await sb.from('question_flags').select('question_id').eq('user_id', userId);
    const flags = {};
    (data||[]).forEach(r=>{ flags[r.question_id]=true; });
    setState({flags});
  },

  async toggleFlag(questionId){
    if(!S.profile) return; // guest: local only
    const flagged = S.flags[questionId];
    if(flagged){
      await sb.from('question_flags').delete().match({user_id:S.profile.id, question_id:questionId});
    } else {
      await sb.from('question_flags').upsert({user_id:S.profile.id, question_id:questionId});
    }
  },

  async startSession(mode, label, lectureId, subjectId, totalQ){
    if(!S.profile) return null;
    const {data} = await sb.from('sessions').insert({
      user_id: S.profile.id,
      subject_id: subjectId||null,
      lecture_id: lectureId||null,
      mode, label, status:'active', total_questions: totalQ,
    }).select().single();
    return data?.id || null;
  },

  async saveAnswer(questionId, selected, isCorrect){
    if(!S.activeSessionId || !S.profile) return;
    await sb.from('session_answers').insert({
      session_id: S.activeSessionId,
      question_id: questionId,
      selected, is_correct: isCorrect,
    });
    // update session counts
    await sb.from('sessions').update({
      answered: Object.keys(S.answers).length,
      correct: Object.values(S.answers).filter((a,i)=>{
        const q=questions()[S.queue[i]]; return q&&a===q.answer;
      }).length,
    }).eq('id', S.activeSessionId);
  },

  async completeSession(){
    if(!S.activeSessionId) return;
    const qs=questions(); let correct=0,answered=0;
    qs.forEach(q=>{const a=S.answers[q.id];if(a!==undefined){answered++;if(a===q.answer)correct++;}});
    await sb.from('sessions').update({
      status:'completed', completed_at: new Date().toISOString(),
      answered, correct,
    }).eq('id', S.activeSessionId);
    setState({activeSessionId:null});
    if(S.profile) await DB.loadSessions(S.profile.id); // refresh real stats
  },

  async loadUsers(){
    const {data} = await sb.from('profiles').select('*').eq('role','student').order('full_name');
    setState({dbUsers: data||[]});
  },

  async createStudent(username, fullName, password, stage=5){
    const {data, error} = await sb.rpc('admin_create_student',{
      p_username: username, p_full_name: fullName, p_password: password, p_stage: stage,
    });
    if(error) return {error: error.message};
    await DB.loadUsers();
    return {id: data?.id, status: data?.status};
  },

  async resetDevice(userId){
    const {error} = await sb.rpc('admin_reset_device',{p_user_id: userId});
    if(!error) await DB.loadUsers();
    return !error;
  },
};

/* ── boot: restore session ── */
render(); // show login immediately — don't wait for async session check

let _restoring = false;

sb.auth.onAuthStateChange((event, session) => {
  // Only handle session restore on page refresh — not during active login
  // (login flow is handled directly in Q.onLogin to avoid double-calling DB.afterLogin).
  // IMPORTANT: supabase-js holds a Web Lock for the duration of this callback, so
  // awaiting any other supabase call here (as DB.afterLogin does) deadlocks the client
  // and hangs every subsequent auth/DB request — the "spinner forever" bug. Defer the
  // work with setTimeout so it runs after the callback returns and the lock is released.
  if(event === 'SIGNED_IN' && session && S.screen === 'login' && !S.loginLoading && !_restoring){
    _restoring = true;
    setTimeout(async () => {
      try { await DB.afterLogin(session.user); } finally { _restoring = false; }
    }, 0);
  }
});

(async()=>{
  const {data:{session}} = await sb.auth.getSession();
  if(session && S.screen === 'login' && !S.loginLoading && !_restoring){
    _restoring = true;
    try { await DB.afterLogin(session.user); } finally { _restoring = false; }
  }
})();

/* ── timer ── */
function startTimer(){
  clearInterval(_timerInterval);
  _timerInterval=setInterval(()=>{
    if(S.screen==='solver'&&S.mode==='exam'&&S.examLeft>0){
      S.examLeft=Math.max(0,S.examLeft-1);
      // only update timer display
      const el=document.getElementById('timer-display');
      if(el){
        const mm=String(Math.floor(S.examLeft/60)).padStart(2,'0');
        const ss=String(S.examLeft%60).padStart(2,'0');
        el.textContent=mm+':'+ss;
      }
    }
  },1000);
}

/* ── keyboard ── */
document.addEventListener('keydown',e=>{
  if(S.screen!=='solver')return;
  if(e.key>='1'&&e.key<='5'){Q.choose(+e.key-1);}
  else if(e.key==='ArrowRight'){Q.next();}
  else if(e.key==='ArrowLeft'){Q.prev();}
  else if(e.key==='f'||e.key==='F'){Q.onFlag();}
});

      <div class="grid-2" style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px">
        <button onclick="Q.onReviewWrong()" style="display:flex;align-items:center;gap:14px;text-align:left;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;cursor:pointer;box-shadow:var(--shadow)">
          <span class="ms" style="font-size:24px;color:var(--red);width:46px;height:46px;background:var(--red-soft);border-radius:12px;display:flex;align-items:center;justify-content:center">replay</span>
          <div><div style="font-weight:700;font-size:15px;color:var(--text)">Review incorrect</div><div style="font-weight:500;font-size:12.5px;color:var(--muted)">${wrong} questions with explanations</div></div>
        </button>
        <button onclick="Q.onReviewFlagged()" style="display:flex;align-items:center;gap:14px;text-align:left;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;cursor:pointer;box-shadow:var(--shadow)">
          <span class="ms" style="font-size:24px;color:var(--yellow-ink);width:46px;height:46px;background:var(--yellow-soft);border-radius:12px;display:flex;align-items:center;justify-content:center">flag</span>
          <div><div style="font-weight:700;font-size:15px;color:var(--text)">Review flagged</div><div style="font-weight:500;font-size:12.5px;color:var(--muted)">${flaggedN} saved questions</div></div>
        </button>
      </div>
      <div style="display:flex;gap:12px">
        <button onclick="Q.onRetry()" style="flex:1;height:50px;border:1px solid var(--border);border-radius:12px;background:var(--surface);color:var(--text);font-weight:700;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px"><span class="ms" style="font-size:20px">refresh</span>Retry lecture</button>
        <button onclick="Q.goDashboard()" style="flex:1;height:50px;border:none;border-radius:12px;background:var(--blue);color:#fff;font-weight:700;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px"><span class="ms" style="font-size:20px">home</span>Back to dashboard</button>
      </div>
    </div>`;
  }

  else if(scr==='analytics'){
    const accColor=a=>a>=80?'var(--green)':(a>=68?'var(--blue)':'var(--yellow-ink)');
    const st=userStats();
    const ss=S.dbSessions||[];
    if(!ss.length){
      pageHTML=`
      <div style="max-width:1080px;margin:0 auto;animation:fadeUp .35s ease both">
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);padding:60px 30px;text-align:center">
          <span class="ms" style="font-size:46px;color:var(--faint)">bar_chart</span>
          <div style="font-weight:800;font-size:20px;color:var(--text);margin:14px 0 6px">No activity yet</div>
          <div style="font-weight:500;font-size:14px;color:var(--muted);margin-bottom:22px">Complete a practice session and your accuracy and progress will show up here.</div>
          <button onclick="Q.goSubjects()" style="height:46px;padding:0 22px;border:none;border-radius:12px;background:var(--blue);color:#fff;font-weight:700;font-size:15px;cursor:pointer;display:inline-flex;align-items:center;gap:8px"><span class="ms" style="font-size:20px">grid_view</span>Browse subjects</button>
        </div>
      </div>`;
    } else {
      // last 7 days bar chart (answered per day)
      const days=[];const dayNames=['Su','Mo','Tu','We','Th','Fr','Sa'];
      for(let i=6;i>=0;i--){const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-i);days.push({key:d.getTime(),label:dayNames[d.getDay()],n:0});}
      ss.forEach(s=>{const d=new Date(s.started_at);d.setHours(0,0,0,0);const slot=days.find(x=>x.key===d.getTime());if(slot)slot.n+=(s.answered||0);});
      const maxN=Math.max(1,...days.map(d=>d.n));
      // accuracy by subject (from completed sessions)
      const bySubj={};
      ss.forEach(s=>{if(!s.subject_id)return;const o=bySubj[s.subject_id]||(bySubj[s.subject_id]={a:0,c:0});o.a+=(s.answered||0);o.c+=(s.correct||0);});
      const subjMap={};subjectsData().forEach(x=>subjMap[x.id]=x.name);
      const subjAccuracy=Object.keys(bySubj).map(id=>({name:subjMap[id]||id,a:bySubj[id].a,acc:bySubj[id].a?Math.round(bySubj[id].c/bySubj[id].a*100):0})).filter(x=>x.a>0).sort((x,y)=>y.acc-x.acc).slice(0,8);
      const best=subjAccuracy[0];
      const anStats=[
        {label:'Total answered',value:fmt(st.answered),note:`${ss.length} session${ss.length>1?'s':''}`,color:'var(--text)'},
        {label:'Overall accuracy',value:st.accuracy==null?'—':st.accuracy+'%',note:`${fmt(st.correct)} correct`,color:'var(--green)'},
        {label:'Sessions completed',value:fmt(st.completed),note:'practice runs',color:'var(--blue)'},
        {label:'Best subject',value:best?best.name:'—',note:best?best.acc+'% accuracy':'—',color:'var(--text)'},
      ];
      pageHTML=`
      <div style="max-width:1080px;margin:0 auto;animation:fadeUp .35s ease both">
        <div class="grid-4" style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px">
          ${anStats.map(s=>`<div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px 20px;box-shadow:var(--shadow)"><div style="font-weight:600;font-size:13px;color:var(--muted);margin-bottom:10px">${s.label}</div><div style="font-weight:800;font-size:28px;letter-spacing:-1px;color:${s.color}">${esc(String(s.value))}</div><div style="font-weight:500;font-size:12px;color:var(--faint);margin-top:2px">${esc(s.note)}</div></div>`).join('')}
        </div>
        <div class="an-grid" style="display:grid;grid-template-columns:1.4fr 1fr;gap:16px">
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:22px;box-shadow:var(--shadow)">
            <div style="font-weight:700;font-size:15px;color:var(--text);margin-bottom:18px">Questions solved this week</div>
            <div style="display:flex;align-items:flex-end;gap:12px;height:160px">
              ${days.map(d=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end">
                <div style="width:100%;border-radius:7px 7px 0 0;background:var(--blue);height:${Math.round(d.n/maxN*100)}%;min-height:4px"></div>
                <div style="font-weight:600;font-size:11px;color:var(--muted)">${d.label}</div>
              </div>`).join('')}
            </div>
          </div>
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:22px;box-shadow:var(--shadow)">
            <div style="font-weight:700;font-size:15px;color:var(--text);margin-bottom:16px">Accuracy by subject</div>
            ${subjAccuracy.length?`<div style="display:flex;flex-direction:column;gap:13px">
              ${subjAccuracy.map(x=>`<div>
                <div style="display:flex;justify-content:space-between;font-weight:600;font-size:12.5px;color:var(--text);margin-bottom:5px"><span>${esc(x.name)}</span><span style="color:${accColor(x.acc)}">${x.acc}%</span></div>
                <div style="height:7px;border-radius:7px;background:var(--surface3);overflow:hidden"><div style="height:100%;width:${x.acc}%;background:${accColor(x.acc)}"></div></div>
              </div>`).join('')}
            </div>`:`<div style="font-weight:500;font-size:13px;color:var(--muted);padding:18px 0">Subject-level accuracy appears once you complete subject tests.</div>`}
          </div>
        </div>
      </div>`;
    }
  }

  else if(scr==='admin'){
    const adminStats=[
      {icon:'group',color:'var(--blue)',label:'Total students',value:fmt(S.dbUsers.length)},
      {icon:'menu_book',color:'var(--green)',label:'Subjects',value:fmt(S.dbSubjects.length)},
      {icon:'list_alt',color:'var(--yellow-ink)',label:'Lectures',value:fmt(S.dbLectures.length)},
      {icon:'quiz',color:'var(--blue)',label:'Total MCQs',value:fmt(S.dbQuestionCount)},
    ];
    const tabs=[['users','Students'],['questions','Questions']];

    // modals (rendered outside main flow, overlaid)
    const modalOverlay=`position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px`;
    const modalBox=`background:var(--surface);border-radius:20px;box-shadow:var(--shadow-lg);width:100%;max-width:460px;padding:28px;position:relative`;

    const createModalHTML=S.showCreateModal?`<div style="${modalOverlay}" onclick="if(event.target===this)Q.closeCreateModal()">
      <div style="${modalBox}">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
          <div style="font-weight:800;font-size:18px;color:var(--text)">Create student account</div>
          <span class="ms" onclick="Q.closeCreateModal()" style="font-size:22px;color:var(--faint);cursor:pointer">close</span>
        </div>
        ${S.createError?`<div style="background:var(--red-soft);color:var(--red);border-radius:10px;padding:10px 14px;font-weight:600;font-size:13px;margin-bottom:14px">${esc(S.createError)}</div>`:''}
        <div style="display:flex;flex-direction:column;gap:12px">
          <div><label style="font-weight:600;font-size:12.5px;color:var(--muted);display:block;margin-bottom:5px">Username</label>
            <input id="cu-username" placeholder="e.g. ahmed.r" style="width:100%;height:42px;border:1.5px solid var(--border);border-radius:10px;padding:0 12px;font-size:14px;background:var(--surface2);color:var(--text);outline:none;font-family:JetBrains Mono,monospace"></div>
          <div><label style="font-weight:600;font-size:12.5px;color:var(--muted);display:block;margin-bottom:5px">Full name</label>
            <input id="cu-fullname" placeholder="Ahmed Al-Rashid" style="width:100%;height:42px;border:1.5px solid var(--border);border-radius:10px;padding:0 12px;font-size:14px;background:var(--surface2);color:var(--text);outline:none"></div>
          <div><label style="font-weight:600;font-size:12.5px;color:var(--muted);display:block;margin-bottom:5px">Password</label>
            <input id="cu-password" type="password" placeholder="Temporary password" style="width:100%;height:42px;border:1.5px solid var(--border);border-radius:10px;padding:0 12px;font-size:14px;background:var(--surface2);color:var(--text);outline:none"></div>
          <div><label style="font-weight:600;font-size:12.5px;color:var(--muted);display:block;margin-bottom:5px">Stage (year)</label>
            <select id="cu-stage" style="width:100%;height:42px;border:1.5px solid var(--border);border-radius:10px;padding:0 12px;font-size:14px;background:var(--surface2);color:var(--text);outline:none">
              ${[1,2,3,4,5,6].map(y=>`<option value="${y}"${y===5?' selected':''}>Year ${y}</option>`).join('')}
            </select></div>
        </div>
        <button onclick="Q.onCreateStudent()" style="width:100%;height:48px;margin-top:20px;border:none;border-radius:12px;background:var(--blue);color:#fff;font-weight:700;font-size:15px;cursor:pointer;opacity:${S.createLoading?.6:1}">
          ${S.createLoading?'Creating…':'Create account'}
        </button>
      </div>
    </div>`:'';

    const bulkModalHTML=S.showBulkModal?`<div style="${modalOverlay}" onclick="if(event.target===this)Q.closeBulkModal()">
      <div style="${modalBox};max-width:540px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <div style="font-weight:800;font-size:18px;color:var(--text)">Bulk create students</div>
          <span class="ms" onclick="Q.closeBulkModal()" style="font-size:22px;color:var(--faint);cursor:pointer">close</span>
        </div>
        <div style="font-weight:500;font-size:13px;color:var(--muted);margin-bottom:14px">One student per line: <span style="font-family:JetBrains Mono;color:var(--text)">username, Full Name, password, stage</span></div>
        <textarea id="bulk-csv" rows="8" placeholder="ahmed.r, Ahmed Al-Rashid, pass123, 5&#10;sara.k, Sara Khalid, pass456, 4&#10;mustafa.m, Mustafa Mahmoud, pass789, 6" style="width:100%;border:1.5px solid var(--border);border-radius:12px;padding:12px;font-size:13px;font-family:JetBrains Mono,monospace;background:var(--surface2);color:var(--text);outline:none;resize:vertical;line-height:1.7">${esc(S.bulkText)}</textarea>
        ${S.bulkResults.length?`<div style="margin-top:12px;max-height:160px;overflow-y:auto;border:1px solid var(--border);border-radius:10px">
          ${S.bulkResults.map(r=>{const ok=r.status!=='error';return`<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border2)"><span class="ms" style="font-size:17px;color:${ok?'var(--green)':'var(--red)'}">${ok?'check_circle':'error'}</span><span style="font-weight:600;font-size:13px;font-family:JetBrains Mono;color:var(--text)">${esc(r.username)}</span><span style="font-weight:500;font-size:12px;color:var(--muted);margin-left:auto">${ok?r.status:esc(r.error||'')}</span></div>`;}).join('')}
        </div>`:''}
        <button onclick="Q.onBulkCreate()" style="width:100%;height:48px;margin-top:16px;border:none;border-radius:12px;background:var(--blue);color:#fff;font-weight:700;font-size:15px;cursor:pointer;opacity:${S.bulkLoading?.6:1}">
          ${S.bulkLoading?'Creating…':'Create all'}
        </button>
      </div>
    </div>`:'';

    let tabContent='';
    if(S.adminTab==='users'){
      const usersToShow=S.dbUsers.length?S.dbUsers:[];
      tabContent=`${createModalHTML}${bulkModalHTML}<div style="background:var(--surface);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);overflow:hidden">
        <div style="display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border)">
          <span style="font-weight:700;font-size:15px;color:var(--text)">Students</span>
          <span style="font-weight:500;font-size:12.5px;color:var(--muted)">${usersToShow.length} total</span>
          <div style="flex:1"></div>
          <button onclick="Q.openBulkModal()" style="display:flex;align-items:center;gap:7px;height:40px;padding:0 14px;border:1.5px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text);font-weight:700;font-size:13px;cursor:pointer;margin-right:8px"><span class="ms" style="font-size:18px">group_add</span>Bulk create</button>
          <button onclick="Q.openCreateModal()" style="display:flex;align-items:center;gap:7px;height:40px;padding:0 16px;border:none;border-radius:10px;background:var(--blue);color:#fff;font-weight:700;font-size:13.5px;cursor:pointer"><span class="ms" style="font-size:19px">person_add</span>Create user</button>
        </div>
        <div style="overflow-x:auto"><div style="min-width:680px">
          <div style="display:grid;grid-template-columns:2fr 1.2fr 1fr 1.1fr 100px;padding:11px 20px;border-bottom:1px solid var(--border);background:var(--surface2);font-weight:700;font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px">
            <div>Student</div><div>Username</div><div>Stage</div><div>Device</div><div></div>
          </div>
          ${usersToShow.length===0
            ?`<div style="padding:48px;text-align:center;color:var(--muted);font-weight:500;font-size:14px"><span class="ms" style="font-size:36px;display:block;margin-bottom:8px">group</span>No students yet — click "Create user" to add one.</div>`
            :usersToShow.map(u=>{
              const name=u.full_name||u.username;
              const hue=180;
              const t=tile(hue);
              const deviceIcon=u.device_fp?'verified_user':'device_unknown';
              const deviceColor=u.device_fp?'var(--green)':'var(--faint)';
              const deviceLabel=u.device_fp?'Registered':'None';
              return `<div style="display:grid;grid-template-columns:2fr 1.2fr 1fr 1.1fr 100px;align-items:center;padding:13px 20px;border-bottom:1px solid var(--border2)">
                <div style="display:flex;align-items:center;gap:11px"><div style="width:34px;height:34px;border-radius:9px;background:${t.bg};color:${t.fg};display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex:none">${(name[0]||'?').toUpperCase()}</div><span style="font-weight:600;font-size:14px;color:var(--text)">${esc(name)}</span></div>
                <div style="font-weight:500;font-size:13px;font-family:'JetBrains Mono';color:var(--muted)">${esc(u.username)}</div>
                <div style="font-weight:500;font-size:13px;color:var(--muted)">Year ${u.stage||5}</div>
                <div style="display:flex;align-items:center;gap:6px;font-weight:500;font-size:12.5px;color:var(--muted)"><span class="ms" style="font-size:16px;color:${deviceColor}">${deviceIcon}</span>${deviceLabel}</div>
                <div style="display:flex;gap:8px;justify-content:flex-end">
                  ${u.device_fp?`<button onclick="Q.resetDevice('${u.id}')" title="Reset device lock" style="height:30px;padding:0 10px;border:1px solid var(--border);border-radius:7px;background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px"><span class="ms" style="font-size:14px">lock_reset</span>Reset</button>`:''}
                </div>
              </div>`;}).join('')}
        </div></div>
      </div>`;
    } else {
      tabContent=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);overflow:hidden">
        <div style="display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border)">
          <span style="font-weight:700;font-size:15px;color:var(--text)">Question bank</span>
          <span style="font-weight:500;font-size:12.5px;color:var(--muted)">${fmt(S.dbQuestionCount)} total</span>
        </div>
        <div style="padding:54px 30px;text-align:center">
          <span class="ms" style="font-size:42px;color:var(--faint)">quiz</span>
          <div style="font-weight:800;font-size:18px;color:var(--text);margin:12px 0 6px">${S.dbQuestionCount?(fmt(S.dbQuestionCount)+' questions in the bank'):'No questions yet'}</div>
          <div style="font-weight:500;font-size:13.5px;color:var(--muted);max-width:480px;margin:0 auto;line-height:1.6">Question authoring and bulk MCQ upload are coming soon. The ${fmt(S.dbSubjects.length)} subjects and ${fmt(S.dbLectures.length)} lectures are already in place and ready for content.</div>
        </div>
      </div>`;
    }

    pageHTML=`
    <div style="max-width:1080px;margin:0 auto;animation:fadeUp .35s ease both">
      <div class="grid-4" style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px">
        ${adminStats.map(s=>`<div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px 20px;box-shadow:var(--shadow)"><div style="display:flex;align-items:center;gap:9px;margin-bottom:10px"><span class="ms" style="font-size:20px;color:${s.color}">${s.icon}</span><span style="font-weight:600;font-size:13px;color:var(--muted)">${s.label}</span></div><div style="font-weight:800;font-size:28px;letter-spacing:-1px;color:var(--text)">${s.value}</div></div>`).join('')}
      </div>
      <div style="display:flex;gap:6px;padding:5px;background:var(--surface2);border:1px solid var(--border);border-radius:13px;width:max-content;margin-bottom:20px;max-width:100%;overflow:auto">
        ${tabs.map(([k,label])=>{const active=S.adminTab===k;return `<button onclick="Q.setAdminTab('${k}')" style="height:38px;padding:0 18px;border:none;border-radius:9px;white-space:nowrap;background:${active?'var(--surface)':'transparent'};color:${active?'var(--text)':'var(--muted)'};font-weight:700;font-size:13.5px;cursor:pointer;box-shadow:${active?'var(--shadow)':'none'}">${label}</button>`;}).join('')}
      </div>
      ${tabContent}
    </div>`;
  }

  return `
  <div style="display:flex;min-height:100vh">
    <aside class="app-sidebar" style="width:248px;flex:none;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;padding:20px 14px">
      <div class="brand-row" style="display:flex;align-items:center;gap:11px;padding:6px 8px 22px">
        <div style="width:30px;height:30px;border-radius:8px;padding:3px;background:linear-gradient(135deg,#3b82f6,#f3b827)"><div style="width:100%;height:100%;background:var(--surface);border-radius:5px"></div></div>
        <div style="font-weight:800;font-size:18px;letter-spacing:-.5px;color:var(--text)">Square<span style="color:var(--yellow-ink)"> QBank</span></div>
      </div>
      <div class="app-nav" style="display:flex;flex-direction:column;gap:2px">${navHTML}</div>
      <div style="flex:1"></div>
      <div class="side-foot" style="border-top:1px solid var(--border);padding-top:14px;margin-top:10px">
        <button onclick="Q.onToggleTheme()" style="width:100%;display:flex;align-items:center;gap:11px;height:42px;padding:0 12px;border:none;border-radius:10px;background:transparent;color:var(--text);font-weight:600;font-size:14px;cursor:pointer"><span class="ms" style="font-size:20px">${themeIcon}</span>${themeLabel}</button>
        ${isGuest
          ? `<div style="display:flex;align-items:center;gap:11px;padding:10px 12px;margin-top:4px;border-radius:10px;background:var(--surface2);border:1px solid var(--border)">
              <div style="width:34px;height:34px;border-radius:9px;background:var(--surface3);display:flex;align-items:center;justify-content:center"><span class="ms" style="font-size:20px;color:var(--faint)">person_off</span></div>
              <div style="min-width:0;flex:1"><div style="font-weight:700;font-size:13px;color:var(--text)">Guest</div><div style="font-weight:500;font-size:11px;color:var(--faint)">Progress not saved</div></div>
              <span onclick="Q.onLogout()" class="ms" style="font-size:20px;color:var(--faint);cursor:pointer" title="Sign in">login</span>
            </div>`
          : (()=>{
              const p=S.profile;
              const displayName=p?(p.full_name||p.username):'Student';
              const initial=(displayName[0]||'S').toUpperCase();
              const sub=p?(p.role==='admin'?`Administrator · ${p.username}`:`${p.stage}th stage · ${p.username}`):'';
              return `<div style="display:flex;align-items:center;gap:11px;padding:10px 12px;margin-top:4px;border-radius:10px">
                <div style="width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--blue),var(--yellow));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff">${esc(initial)}</div>
                <div style="min-width:0;flex:1"><div style="font-weight:700;font-size:13.5px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(displayName)}</div><div style="font-weight:500;font-size:11.5px;color:var(--muted)">${esc(sub)}</div></div>
                <span onclick="Q.onLogout()" class="ms" style="font-size:20px;color:var(--faint);cursor:pointer">logout</span>
              </div>`;
            })()}
      </div>
    </aside>

    <main class="app-main" style="flex:1;min-width:0;display:flex;flex-direction:column">
      <header class="app-header" style="height:66px;flex:none;display:flex;align-items:center;gap:14px;padding:0 30px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5">
        <div style="min-width:0">
          <div style="font-weight:800;font-size:19px;letter-spacing:-.5px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(tt[0])}</div>
          <div style="font-weight:500;font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(tt[1])}</div>
        </div>
        <div style="flex:1"></div>
        <div class="header-search" style="display:flex;align-items:center;gap:9px;height:42px;padding:0 14px;border:1px solid var(--border);border-radius:11px;background:var(--surface2);width:300px;max-width:34vw">
          <span class="ms" style="font-size:20px;color:var(--faint)">search</span>
          <input placeholder="Search subjects, lectures, topics…" style="border:none;background:transparent;outline:none;font-weight:500;font-size:14px;color:var(--text);flex:1;min-width:0;font-family:Figtree">
        </div>
        <button class="mobile-only" onclick="Q.onToggleTheme()" style="width:42px;height:42px;border:1px solid var(--border);border-radius:11px;background:var(--surface);color:var(--text);cursor:pointer;align-items:center;justify-content:center"><span class="ms" style="font-size:21px">${themeIcon}</span></button>
        ${isGuest
          ? `<button onclick="Q.onLogout()" style="display:flex;align-items:center;gap:8px;height:42px;padding:0 16px;border:1.5px solid var(--yellow);border-radius:11px;background:var(--yellow-soft);color:var(--yellow-ink);font-weight:700;font-size:14px;cursor:pointer;white-space:nowrap"><span class="ms" style="font-size:19px">login</span><span class="rlabel">Sign in</span></button>`
          : `<button onclick="Q.goSubjects()" style="display:flex;align-items:center;gap:8px;height:42px;padding:0 16px;border:none;border-radius:11px;background:var(--blue);color:#fff;font-weight:700;font-size:14px;cursor:pointer;white-space:nowrap"><span class="ms" style="font-size:19px">grid_view</span><span class="rlabel">Practice</span></button>`}
      </header>

      <div class="content-pad" style="flex:1;overflow:auto;padding:30px">
        ${isGuest?`<div style="display:flex;align-items:center;gap:12px;padding:12px 18px;border-radius:13px;background:var(--yellow-soft);border:1.5px solid var(--yellow);margin-bottom:22px">
          <span class="ms" style="font-size:20px;color:var(--yellow-ink)">info</span>
          <span style="font-weight:500;font-size:13.5px;color:var(--yellow-ink);flex:1">You're browsing as a <b>guest</b> — your progress and answers won't be saved.</span>
          <button onclick="Q.onLogout()" style="height:34px;padding:0 14px;border:none;border-radius:8px;background:var(--yellow-ink);color:#fff;font-weight:700;font-size:13px;cursor:pointer">Sign in</button>
        </div>`:''}

        ${pageHTML}
      </div>
    </main>
  </div>`;
}

/* ── main render ── */
function render(){
  const root=document.getElementById('app');
  root.setAttribute('data-theme', S.theme);
  root.style.cssText='min-height:100vh;background:var(--bg);color:var(--text);font-family:Figtree,sans-serif;-webkit-font-smoothing:antialiased';

  if(S.screen==='login') root.innerHTML=renderLogin();
  else if(S.screen==='solver') root.innerHTML=renderSolver();
  else root.innerHTML=renderApp();
}

startTimer();
</script>
</body>
</html>
