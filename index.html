const BP_KEY = 'sq_blueprint_v2';
function defaultBP(){ return {passes:[{id:'study',name:'Study',type:'study'}], activePass:'study', checks:{study:{}}, openMat:{}, openTopic:{}}; }
function loadBP(){ try{ const v=JSON.parse(localStorage.getItem(BP_KEY)); if(v&&Array.isArray(v.passes)&&v.passes.length&&v.checks) return v; }catch(_){} return defaultBP(); }
function saveBP(){ try{ localStorage.setItem(BP_KEY, JSON.stringify({passes:S.passes,activePass:S.activePass,checks:S.checks,openMat:S.openMat,openTopic:S.openTopic})); }catch(_){} }
// Ticks for the currently-selected pass (lazily created).
function curChecks(){ if(!S.checks[S.activePass]) S.checks[S.activePass]={}; return S.checks[S.activePass]; }
// All subtopic ids under a material / a topic — used for progress and "tick all".
function matSubIds(m){ const ids=[]; m.topics.forEach((t,ti)=>t.s.forEach((_,si)=>ids.push(m.id+'.'+ti+'.'+si))); return ids; }
function topicSubIds(mId,ti,t){ return t.s.map((_,si)=>mId+'.'+ti+'.'+si); }
// Quiz mode maps each blueprint material/topic to a Supabase subject/lecture.
// IDs must match supabase/migrations/019_seed_6th_blueprint.sql exactly.
function bpSubjId(mId){ return 'bp6_'+mId; }
function bpLecId(mId,ti){ return 'bp6_'+mId+'_'+ti; }
// Restore the whole checklist (passes, active pass, ticks, open sections) so a
// returning user resumes where they were. Runs now that BP_KEY is defined.
(function(){ const v=loadBP(); S.passes=v.passes; S.activePass=v.activePass; S.checks=v.checks; S.openMat=v.openMat||{}; S.openTopic=v.openTopic||{}; })();

/* ── data ── */
function subjectsData(){
  if(S.dbSubjects.length){
    // Student/guest browsing is scoped to the selected stage (subjects default
    // to stage 5). The admin panel reads S.dbSubjects directly, so it is unaffected.
    return S.dbSubjects.filter(s=>(s.stage||5)===S.stage).map(s=>{
      const lecs=S.dbLectures.filter(l=>l.subject_id===s.id);
      return {id:s.id,name:s.name,hue:s.hue,category:s.category||s.name,lectures:lecs.length||0,q:0,pct:0,acc:0};
    });
  }
  return[];
}

function subjectsByCategory(){
  const all=subjectsData();
  const order=['Medicine','Surgery','ENT','Ophthalmology','Orthopedics','Gynaecology','Psychiatry','Pediatric','Dermatology','Medical Ethics'];
  const map={};
  all.forEach(s=>{
    const cat=s.category||s.name;
    if(!map[cat]) map[cat]=[];
    map[cat].push(s);
  });
  const result=[];
  order.forEach(cat=>{if(map[cat]) result.push({cat,subjects:map[cat]});});
  Object.keys(map).forEach(cat=>{if(!order.includes(cat)) result.push({cat,subjects:map[cat]});});
  return result;
}

function lecturesFor(id){
  if(S.dbLectures.length){
    return S.dbLectures
      .filter(l=>l.subject_id===id)
      .sort((a,b)=>a.sort_order-b.sort_order)
      .map(l=>({id:l.id,name:l.name,q:0,pct:0,acc:0}));
  }
  return [];
}

function questions(){
  // Real questions from Supabase, mapped to the app's shape.
  // Empty until MCQs are added to the bank — the UI shows honest empty states.
  return S.dbQuestions.map(q=>({
    id: q.id,
    tag: q.tag || q.lecture_id,
    stem: q.stem,
    image: q.image_url||'',
    // keep only the options that were actually filled in (True/False
    // questions store just A & B; the trailing C–E are left empty).
    options:[q.option_a,q.option_b,q.option_c,q.option_d,q.option_e]
      .filter(o=>o!=null && (''+o).trim()!==''),
    answer: q.answer,
    explanation: q.explanation||'',
  }));
}

/* ── helpers ── */
function fmt(n){return (''+n).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
// slugify a name into a stable id; ensure it doesn't collide with existing ids.
function slugId(name){return (name||'').toLowerCase().trim().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'').slice(0,40);}
function uniqueId(base,existing){let id=base||('id_'+Date.now().toString(36));if(!existing.includes(id))return id;let n=2;while(existing.includes(id+'_'+n))n++;return id+'_'+n;}
// read the live values out of an MCQ add/edit form (prefix 'eq' or 'aq') so a
// re-render (e.g. switching topic) never loses what the admin has typed.
function readQForm(prefix){
  const g=id=>document.getElementById(id);
  const opts=['a','b','c','d','e'].map(L=>g(prefix+'-opt-'+L)?.value??'');
  return {
    stem:g(prefix+'-stem')?.value??'',
    option_a:opts[0],option_b:opts[1],option_c:opts[2],option_d:opts[3],option_e:opts[4],
    answer:parseInt(g(prefix+'-answer')?.value||'0'),
    tag:g(prefix+'-tag')?.value??'',
    explanation:g(prefix+'-expl')?.value??'',
  };
}
function tile(hue){
  return S.theme==='dark'
    ?{bg:'oklch(0.30 0.055 '+hue+')',fg:'oklch(0.80 0.12 '+hue+')'}
    :{bg:'oklch(0.95 0.045 '+hue+')',fg:'oklch(0.52 0.14 '+hue+')'};
}
function curQ(){const qs=questions();return qs[S.queue[S.qPos]]||qs[0];}

/* real per-user stats derived from loaded sessions */
function userStats(){
  const ss=S.dbSessions||[];
  const answered=ss.reduce((n,s)=>n+(s.answered||0),0);
  const correct=ss.reduce((n,s)=>n+(s.correct||0),0);
  const completed=ss.filter(s=>s.status==='completed').length;
  const weekAgo=Date.now()-7*864e5;
  const weekAnswered=ss.filter(s=>new Date(s.started_at).getTime()>=weekAgo).reduce((n,s)=>n+(s.answered||0),0);
  const flagged=Object.keys(S.flags||{}).filter(k=>S.flags[k]).length;
  return {answered,correct,completed,weekAnswered,flagged,accuracy:answered?Math.round(correct/answered*100):null,sessions:ss.length};
}

function setState(patch){
  if(typeof patch==='function') patch=patch(S);
  Object.assign(S,patch);
  render();
}

  async confirmDeleteQuestion(){
    const id=S.deleteQId; if(!id)return;
    setState({qDeleting:true});
    const res=await DB.deleteQuestion(id);
    if(res.error){setState({qDeleting:false}); alert('Remove failed: '+res.error); return;}
    // If deleting mid-session (from the solver/review screen), drop it from the live
    // queue by identity so index-based navigation doesn't break.
    if(S.screen==='solver' && S.dbQuestions.some(q=>q.id===id)){
      const curId=(()=>{const cq=questions()[S.queue[S.qPos]];return cq?cq.id:null;})();
      const orderedIds=S.queue.map(qi=>{const qq=questions()[qi];return qq?qq.id:null;});
      const newDb=S.dbQuestions.filter(q=>q.id!==id);
      if(!newDb.length){ setState({dbQuestions:[],queue:[],qPos:0,deleteQId:null,qDeleting:false,screen:'subjects'}); return; }
      const posById={}; newDb.forEach((q,i)=>{ posById[q.id]=i; });
      const newQueue=orderedIds.filter(qid=>qid&&qid!==id&&posById[qid]!==undefined).map(qid=>posById[qid]);
      let newPos;
      if(curId&&curId!==id&&posById[curId]!==undefined){ newPos=newQueue.indexOf(posById[curId]); }
      else { newPos=Math.min(S.qPos,newQueue.length-1); }   // current was deleted → stay near same spot
      setState({dbQuestions:newDb,queue:newQueue,qPos:Math.max(0,newPos),deleteQId:null,qDeleting:false});
      return;
    }
    setState({deleteQId:null,qDeleting:false});

const DB = {

  async afterLogin(user){
    const {data:prof, error:profErr} = await sb.from('profiles').select('*').eq('id', user.id).single();
    if(profErr || !prof){ setState({authError:'Profile not found. Contact administrator.', loginLoading:false}); await sb.auth.signOut(); return; }
    if(!prof.is_active){ setState({authError:'Account is deactivated. Contact administrator.', loginLoading:false}); await sb.auth.signOut(); return; }

    // device lock check (non-fatal — if it errors, continue).
    // Admins are exempt: they manage from multiple devices.
    if(prof.role !== 'admin'){
      try {
        const fp = getDeviceFP();
        const {data:devRes} = await sb.rpc('lock_device', {p_fp: fp});
        if(devRes?.status === 'locked'){
          await sb.auth.signOut();
          setState({authError:'This account is locked to another device. Contact your administrator to reset.', loginLoading:false});
          return;
        }
      } catch(_){}
    }

    // load data in parallel — failures are non-fatal
    await Promise.allSettled([
      DB.loadSubjectsAndLectures(),
      DB.loadSessions(user.id),
      DB.loadFlags(user.id),
      prof.role === 'admin' ? DB.loadUsers() : Promise.resolve(),
      prof.role === 'admin' ? DB.loadQuestionCount() : Promise.resolve(),
    ]);

    setState({
      profile: prof,
      role: prof.role === 'admin' ? 'admin' : 'user',
      stage: prof.stage || 5,   // scope the subject list to the student's stage
      screen: 'dashboard',
      loginLoading: false,
      answers:{}, flags: S.flags, qPos:0, authError:'',
    });
  },

  async loadSubjectsAndLectures(){
    const {data:subjects} = await sb.from('subjects').select('*').order('sort_order');
    const {data:lectures} = await sb.from('lectures').select('*').order('sort_order');
    setState({dbSubjects: subjects||[], dbLectures: lectures||[]});
  },

  async loadQuestions(lectureId){
    let q = sb.from('questions').select('*').eq('is_active', true);
    if(lectureId) q = q.eq('lecture_id', lectureId);
    const {data} = await q.order('created_at');
    setState({dbQuestions: data||[]});
  },

  async loadQuestionsForLectures(lectureIds){
    const ids=(lectureIds||[]).filter(Boolean);
    if(!ids.length){ setState({dbQuestions: []}); return; }
    const {data} = await sb.from('questions').select('*')
      .eq('is_active', true).in('lecture_id', ids).order('created_at');
    setState({dbQuestions: data||[]});
  },

  // Per-topic question counts for the 6th-stage quiz list. One light query
  // (lecture_id only) over the whole bp6 bank; RLS lets guests read it.
  async loadSixthCounts(){
    const {data} = await sb.from('questions').select('lecture_id')
      .like('subject_id','bp6_%').eq('is_active',true);
    const counts={}; (data||[]).forEach(r=>{ counts[r.lecture_id]=(counts[r.lecture_id]||0)+1; });
    setState({quizCounts:counts});
  },

  async loadSessions(userId){
    const {data} = await sb.from('sessions').select('*')
      .eq('user_id', userId).order('started_at', {ascending:false});
    setState({dbSessions: data||[]});
  },

  async loadQuestionCount(){
    const {count} = await sb.from('questions').select('id', {count:'exact', head:true}).eq('is_active', true);
    setState({dbQuestionCount: count||0});
  },

  async loadAdminQuestions(){
    const {data} = await sb.from('questions').select('*').eq('is_active', true).order('created_at');
    setState({dbAdminQuestions: data||[]});
  },

  async updateQuestion(id, fields){
    const {error} = await sb.from('questions').update(fields).eq('id', id);
    if(error) return {error: error.message};
    // reflect the edit in any live session queue (solver/review) without a reload
    const patched=S.dbQuestions.map(q=>q.id===id?{...q,...fields}:q);
    setState({dbQuestions:patched});
    await Promise.allSettled([DB.loadAdminQuestions(), DB.loadQuestionCount()]);
    return {};
  },

  async createQuestion(fields){
    const {error} = await sb.from('questions').insert({
      ...fields, is_active:true, created_by:S.profile?.id||null,
    });
    if(error) return {error: error.message};
    await Promise.allSettled([DB.loadAdminQuestions(), DB.loadQuestionCount()]);
    return {};
  },

  async renameSubject(id, name, stage){
    // `stage` is optional so the call degrades gracefully if migration 018 (the
    // subjects.stage column) hasn't been applied to the database yet.
    let {error} = await sb.from('subjects').update({name, stage}).eq('id', id);
    if(error && /stage/i.test(error.message||'')) ({error} = await sb.from('subjects').update({name}).eq('id', id));
    if(error) return {error: error.message};
    await DB.loadSubjectsAndLectures();
    return {};
  },

  async addSubject(name, stage){
    const id = uniqueId(slugId(name), S.dbSubjects.map(s=>s.id));
    const maxSort = S.dbSubjects.reduce((m,s)=>Math.max(m,s.sort_order||0), 0);
    const base = {id, name, hue:255, sort_order:maxSort+1, is_active:true};
    let {error} = await sb.from('subjects').insert({...base, stage:stage||5});
    if(error && /stage/i.test(error.message||'')) ({error} = await sb.from('subjects').insert(base));
    if(error) return {error: error.message};
    await DB.loadSubjectsAndLectures();
    return {};
  },

  async renameLecture(id, name){
    const {error} = await sb.from('lectures').update({name}).eq('id', id);
    if(error) return {error: error.message};
    await DB.loadSubjectsAndLectures();
    return {};
  },

  async addLecture(subjectId, name){
    if(!subjectId) return {error:'No topic selected.'};
    const id = uniqueId(slugId(name), S.dbLectures.map(l=>l.id));
    const sibs = S.dbLectures.filter(l=>l.subject_id===subjectId);
    const maxSort = sibs.reduce((m,l)=>Math.max(m,l.sort_order||0), 0);
    const {error} = await sb.from('lectures').insert({id, subject_id:subjectId, name, sort_order:maxSort+1, is_active:true});
    if(error) return {error: error.message};
    await DB.loadSubjectsAndLectures();
    return {};
  },

  async deleteQuestion(id){
    // Soft-delete: hide it from the bank and every practice set (all loaders
    // filter is_active = true) while preserving students' past session_answers
    // (a hard delete would break that foreign key).
    const {error} = await sb.from('questions').update({is_active:false}).eq('id', id);
    if(error) return {error: error.message};
    await Promise.allSettled([DB.loadAdminQuestions(), DB.loadQuestionCount()]);
    return {};
  },

  async loadFlags(userId){
    const {data} = await sb.from('question_flags').select('question_id').eq('user_id', userId);
    const flags = {};
    (data||[]).forEach(r=>{ flags[r.question_id]=true; });
    setState({flags});
  },

  async toggleFlag(questionId){
    if(!S.profile) return; // guest: local only
    const flagged = S.flags[questionId];
    if(flagged){
      await sb.from('question_flags').delete().match({user_id:S.profile.id, question_id:questionId});
    } else {
      await sb.from('question_flags').upsert({user_id:S.profile.id, question_id:questionId});
    }
  },

  async startSession(mode, label, lectureId, subjectId, totalQ){
    if(!S.profile) return null;
    const {data} = await sb.from('sessions').insert({
      user_id: S.profile.id,
      subject_id: subjectId||null,
      lecture_id: lectureId||null,
      mode, label, status:'active', total_questions: totalQ,
    }).select().single();
    return data?.id || null;
  },

  async saveAnswer(questionId, selected, isCorrect){
    if(!S.activeSessionId || !S.profile) return;
    await sb.from('session_answers').insert({
      session_id: S.activeSessionId,
      question_id: questionId,
      selected, is_correct: isCorrect,
    });
    // update session counts
    await sb.from('sessions').update({
      answered: Object.keys(S.answers).length,
      correct: Object.values(S.answers).filter((a,i)=>{
        const q=questions()[S.queue[i]]; return q&&a===q.answer;
      }).length,
    }).eq('id', S.activeSessionId);
  },

  async completeSession(){
    if(!S.activeSessionId) return;
    const qs=questions(); let correct=0,answered=0;
    qs.forEach(q=>{const a=S.answers[q.id];if(a!==undefined){answered++;if(a===q.answer)correct++;}});
    await sb.from('sessions').update({
      status:'completed', completed_at: new Date().toISOString(),
      answered, correct,
    }).eq('id', S.activeSessionId);
    setState({activeSessionId:null});
    if(S.profile) await DB.loadSessions(S.profile.id); // refresh real stats
  },

  async loadUsers(){
    const {data} = await sb.from('profiles').select('*').eq('role','student').order('full_name');
    setState({dbUsers: data||[]});
  },

  async createStudent(username, fullName, password, stage=5){
    const {data, error} = await sb.rpc('admin_create_student',{
      p_username: username, p_full_name: fullName, p_password: password, p_stage: stage,
    });
    if(error) return {error: error.message};
    await DB.loadUsers();
    return {id: data?.id, status: data?.status};
  },

  async resetDevice(userId){
    const {error} = await sb.rpc('admin_reset_device',{p_user_id: userId});
    if(!error) await DB.loadUsers();
    return !error;
  },
};

/* ── boot: restore session ── */
// Deep links: ?stage=5 / ?stage=6 jump straight into that stage as a guest.
// Otherwise the stage picker is the landing screen (returning logged-in users
// are sent on to the dashboard by the session-restore code below).
const _urlStage = parseInt(new URLSearchParams(location.search).get('stage'), 10);
const _hasStageLink = (_urlStage === 5 || _urlStage === 6);
if(_hasStageLink){ S.screen = 'stage'; Q.onPickStage(_urlStage); }
else { S.screen = 'stage'; }
render(); // show landing immediately — don't wait for async session check

let _restoring = false;

sb.auth.onAuthStateChange((event, session) => {
  // Only handle session restore on page refresh — not during active login
  // (login flow is handled directly in Q.onLogin to avoid double-calling DB.afterLogin).
  // IMPORTANT: supabase-js holds a Web Lock for the duration of this callback, so
  // awaiting any other supabase call here (as DB.afterLogin does) deadlocks the client
  // and hangs every subsequent auth/DB request — the "spinner forever" bug. Defer the
  // work with setTimeout so it runs after the callback returns and the lock is released.
  if(event === 'SIGNED_IN' && session && !_hasStageLink && (S.screen === 'login' || S.screen === 'stage') && !S.loginLoading && !_restoring){
    _restoring = true;
    setTimeout(async () => {
      try { await DB.afterLogin(session.user); } finally { _restoring = false; }
    }, 0);
  }
});

(async()=>{
  const {data:{session}} = await sb.auth.getSession();
  if(session && !_hasStageLink && (S.screen === 'login' || S.screen === 'stage') && !S.loginLoading && !_restoring){
    _restoring = true;
    try { await DB.afterLogin(session.user); } finally { _restoring = false; }
  }
})();

/* ── timer ── */
function startTimer(){
  clearInterval(_timerInterval);
  _timerInterval=setInterval(()=>{
    if(S.screen==='solver'&&S.mode==='exam'&&S.examLeft>0){
      S.examLeft=Math.max(0,S.examLeft-1);
      // only update timer display
      const el=document.getElementById('timer-display');
      if(el){
        const mm=String(Math.floor(S.examLeft/60)).padStart(2,'0');
        const ss=String(S.examLeft%60).padStart(2,'0');
        el.textContent=mm+':'+ss;
      }
    }
  },1000);
}

/* ── keyboard ── */
document.addEventListener('keydown',e=>{
  if(S.screen!=='solver')return;
  // Don't hijack keystrokes while a modal is open (e.g. editing a question) or
  // while the user is typing into a form field — otherwise digits/arrows/"f"
  // would answer, skip or flag the question behind the modal and the re-render
  // would wipe everything typed into the edit form.
  if(S.showQEdit||S.deleteQId)return;
  const t=e.target;
  if(t&&(t.isContentEditable||/^(INPUT|TEXTAREA|SELECT)$/.test(t.tagName)))return;
  if(e.key>='1'&&e.key<='5'){Q.choose(+e.key-1);}
  else if(e.key==='ArrowRight'){Q.next();}
  else if(e.key==='ArrowLeft'){Q.prev();}
  else if(e.key==='f'||e.key==='F'){Q.onFlag();}
});

  const materials = BLUEPRINT_6TH.map(m=>{
    const t=tile(m.hue);
    const matIds=matSubIds(m); const mDone=matIds.filter(id=>cur[id]).length; const mTot=matIds.length;

      const tIds=topicSubIds(m.id,ti,tp); const tDone=tIds.filter(id=>cur[id]).length; const tTot=tIds.length;
      const tState=tDone===0?'empty':(tDone===tTot?'full':'part');
      const key=m.id+'.'+ti; const topen=!!S.openTopic[key];
      const subsHTML = topen ? tp.s.map((sub,si)=>{
        const id=m.id+'.'+ti+'.'+si; const on=!!cur[id];

          <div style="height:9px;border-radius:9px;background:var(--surface3);overflow:hidden"><div style="height:100%;width:${gPct}%;background:linear-gradient(90deg,var(--blue),var(--yellow))"></div></div>
        </div>
        <div style="display:flex;flex-direction:column;gap:14px">${materials}</div>`;
  return sixthShell('checklist','Exam blueprint checklist',
    'Track your progress across the four 6th-year materials. Open a material to reveal its core topics, then open a topic to tick its subtopics. Use separate Study and Revision passes — everything is saved on this device and resumes when you return.',
    body);
}

// Quiz mode: the same blueprint materials/topics, but each topic links to its
// own MCQ set (Supabase-backed, served by the solver). Topics with no questions
// yet show an honest empty state until the bank is filled in via the admin panel.
function renderQuiz(){
  const counts=S.quizCounts;   // null until loaded; {} once loaded with no rows
  const loading=counts===null;
  let gQ=0; if(counts) Object.values(counts).forEach(n=>gQ+=n);

  const materials = BLUEPRINT_6TH.map(m=>{
    const t=tile(m.hue);
    const mQ=m.topics.reduce((n,_,ti)=>n+((counts&&counts[bpLecId(m.id,ti)])||0),0);
    const ready=m.topics.reduce((n,_,ti)=>n+(((counts&&counts[bpLecId(m.id,ti)])||0)>0?1:0),0);
    const open=!!S.quizQMat[m.id];

  const letters=['A','B','C','D','E'];

  // Shared field set for both the Edit and Add modals. `prefix` namespaces the
  // input ids ('eq' = edit, 'aq' = add) so readQForm() can snapshot the right form.
  // The Topic select re-scopes the Subtopic select, hence the onchange handlers.
  const formFields=(prefix,q)=>{
    const subjH=prefix==='eq'?'Q.onEditSubject':'Q.onAddSubject';
    const lecH =prefix==='eq'?'Q.onEditLecture':'Q.onAddLecture';

    const lecOpts=lecRows.map(l=>`<option value="${l.id}"${q.lecture_id===l.id?' selected':''}>${esc(l.name)}</option>`).join('')
      ||`<option value="">No subtopics yet</option>`;
    return `
      <div style="display:flex;gap:10px">
        <div style="flex:1;min-width:0"><label style="${lblCss}">Topic</label>
          <select id="${prefix}-subject" onchange="${subjH}(this.value)" style="${inCss}">${subOpts}</select></div>
        <div style="flex:1;min-width:0"><label style="${lblCss}">Subtopic</label>
          <select id="${prefix}-lecture" onchange="${lecH}(this.value)" style="${inCss}">${lecOpts}</select></div>
      </div>
      <div><label style="${lblCss}">Question stem</label>
        <textarea id="${prefix}-stem" rows="3" style="${taCss}">${esc(q.stem||'')}</textarea></div>
      ${letters.map((L,i)=>`<div><label style="${lblCss}">Option ${L}${i>1?' <span style="color:var(--faint);font-weight:500">(optional)</span>':''}</label>
        <input id="${prefix}-opt-${L.toLowerCase()}" value="${esc(q['option_'+L.toLowerCase()]||'')}" style="${inCss}"></div>`).join('')}
      <div><label style="${lblCss}">Correct answer</label>
        <select id="${prefix}-answer" style="${inCss}">
          ${letters.map((L,i)=>`<option value="${i}"${q.answer===i?' selected':''}>Option ${L}</option>`).join('')}
        </select></div>
      <div><label style="${lblCss}">Tag / sub-label <span style="color:var(--faint);font-weight:500">(optional)</span></label>
        <input id="${prefix}-tag" value="${esc(q.tag||'')}" style="${inCss}"></div>
      <div><label style="${lblCss}">Explanation</label>
        <textarea id="${prefix}-expl" rows="4" style="${taCss}">${esc(q.explanation||'')}</textarea></div>`;
  };

  // The form is tall, so scroll the whole overlay (anchored to top) rather than an
  // internal fixed-height box — internal scrolling gets clipped/captured on mobile viewports.
  const editOverlay=`position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;-webkit-overflow-scrolling:touch`;
  const eq=S.editQ;
  const qEditModalHTML=(S.showQEdit&&eq)?`<div style="${editOverlay}" onclick="if(event.target===this)Q.closeQEdit()">
    <div style="${modalBox};max-width:600px;margin:auto">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
        <div style="font-weight:800;font-size:18px;color:var(--text)">Edit question</div>
        <span class="ms" onclick="Q.closeQEdit()" style="font-size:22px;color:var(--faint);cursor:pointer">close</span>
      </div>
      ${S.qSaveError?`<div style="background:var(--red-soft);color:var(--red);border-radius:10px;padding:10px 14px;font-weight:600;font-size:13px;margin-bottom:14px">${esc(S.qSaveError)}</div>`:''}
      <div style="display:flex;flex-direction:column;gap:13px">${formFields('eq',eq)}</div>
      <div style="display:flex;gap:10px;margin-top:20px">
        <button onclick="Q.closeQEdit()" style="flex:1;height:46px;border:1.5px solid var(--border);border-radius:12px;background:var(--surface);color:var(--text);font-weight:700;font-size:14px;cursor:pointer">Cancel</button>
        <button onclick="Q.onSaveQuestion()" style="flex:2;height:46px;border:none;border-radius:12px;background:var(--blue);color:#fff;font-weight:700;font-size:14px;cursor:pointer;opacity:${S.qSaving?.6:1}">${S.qSaving?'Saving…':'Save changes'}</button>
      </div>
    </div></div>`:'';

  const aq=S.addQ;
  const qAddModalHTML=(S.showQAdd&&aq)?`<div style="${editOverlay}" onclick="if(event.target===this)Q.closeQAdd()">
    <div style="${modalBox};max-width:600px;margin:auto">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
        <div style="font-weight:800;font-size:18px;color:var(--text)">New question</div>
        <span class="ms" onclick="Q.closeQAdd()" style="font-size:22px;color:var(--faint);cursor:pointer">close</span>
      </div>
      ${S.qAddError?`<div style="background:var(--red-soft);color:var(--red);border-radius:10px;padding:10px 14px;font-weight:600;font-size:13px;margin-bottom:14px">${esc(S.qAddError)}</div>`:''}
      <div style="display:flex;flex-direction:column;gap:13px">${formFields('aq',aq)}</div>
      <div style="display:flex;gap:10px;margin-top:20px">
        <button onclick="Q.closeQAdd()" style="flex:1;height:46px;border:1.5px solid var(--border);border-radius:12px;background:var(--surface);color:var(--text);font-weight:700;font-size:14px;cursor:pointer">Cancel</button>
        <button onclick="Q.onSaveNewQuestion()" style="flex:2;height:46px;border:none;border-radius:12px;background:var(--blue);color:#fff;font-weight:700;font-size:14px;cursor:pointer;opacity:${S.qAdding?.6:1}">${S.qAdding?'Adding…':'Add question'}</button>
      </div>
    </div></div>`:'';

  const dq=S.deleteQId?(S.dbAdminQuestions.find(x=>x.id===S.deleteQId)||S.dbQuestions.find(x=>x.id===S.deleteQId)):null;
  const qDeleteModalHTML=dq?`<div style="${modalOverlay}" onclick="if(event.target===this)Q.cancelDeleteQuestion()">
    <div style="${modalBox};max-width:420px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
        <div style="width:40px;height:40px;border-radius:11px;background:var(--red-soft);display:flex;align-items:center;justify-content:center;flex:none"><span class="ms" style="font-size:22px;color:var(--red)">delete</span></div>
        <div style="font-weight:800;font-size:17px;color:var(--text)">Remove this question?</div>
      </div>
      <div style="font-weight:500;font-size:13.5px;color:var(--muted);line-height:1.6;margin-bottom:16px">It will be removed from the bank and every practice set. Students' past answers are kept.</div>
      <div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-weight:500;font-size:13px;color:var(--text);margin-bottom:18px;line-height:1.5">${esc((dq.stem||'').slice(0,160))}${(dq.stem||'').length>160?'…':''}</div>
      <div style="display:flex;gap:10px">
        <button onclick="Q.cancelDeleteQuestion()" style="flex:1;height:46px;border:1.5px solid var(--border);border-radius:12px;background:var(--surface);color:var(--text);font-weight:700;font-size:14px;cursor:pointer">Cancel</button>
        <button onclick="Q.confirmDeleteQuestion()" style="flex:1;height:46px;border:none;border-radius:12px;background:var(--red);color:#fff;font-weight:700;font-size:14px;cursor:pointer;opacity:${S.qDeleting?.6:1}">${S.qDeleting?'Removing…':'Remove'}</button>
      </div>
    </div></div>`:'';

  return qEditModalHTML+qAddModalHTML+qDeleteModalHTML;
}

function renderSolver(){
  const q=curQ();
  const ans=S.answers[q.id];
  const answered=ans!==undefined;
  const reveal=S.mode==='study'&&answered;
  const flagged=!!S.flags[q.id];
  const isAdmin=!!(S.profile&&S.profile.role==='admin');
  const mm=String(Math.floor(S.examLeft/60)).padStart(2,'0');
  const ss2=String(S.examLeft%60).padStart(2,'0');
  const answeredInQueue=S.queue.filter(qi=>S.answers[questions()[qi].id]!==undefined).length;
  const progressPct=Math.round(answeredInQueue/S.queue.length*100);
  const modeLabel=S.mode==='exam'?'Exam mode':'Study mode';
  const themeIcon=S.theme==='dark'?'light_mode':'dark_mode';

  const choicesHTML=q.options.map((text,i)=>{
    const letter='ABCDE'[i],isSel=ans===i,isCor=i===q.answer;
    let bd='var(--border)',bg='var(--surface)',col='var(--text)';
    let lbd='var(--border)',lbg='var(--surface2)',lcol='var(--muted)';
    let showMark=false,markIcon='',markColor='';
    if(reveal){
      if(isCor){bd='var(--green)';bg='var(--green-soft)';lbd='var(--green)';lbg='var(--green)';lcol='#fff';showMark=true;markIcon='check_circle';markColor='var(--green)';}
      else if(isSel){bd='var(--red)';bg='var(--red-soft)';lbd='var(--red)';lbg='var(--red)';lcol='#fff';showMark=true;markIcon='cancel';markColor='var(--red)';}
      else{col='var(--muted)';}
    } else if(isSel){bd='var(--blue)';bg='var(--blue-soft)';lbd='var(--blue)';lbg='var(--blue)';lcol='#fff';}
    return `<button onclick="Q.choose(${i})" style="display:flex;align-items:center;gap:14px;width:100%;padding:15px 18px;margin-bottom:10px;border-radius:13px;border:1.5px solid ${bd};background:${bg};color:${col};font-weight:500;font-size:15.5px;cursor:${reveal?'default':'pointer'};text-align:left;transition:all .12s">
      <span style="width:30px;height:30px;flex:none;border-radius:8px;border:1.5px solid ${lbd};background:${lbg};color:${lcol};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px">${letter}</span>
      <span style="flex:1;text-align:left">${esc(text)}</span>
      ${showMark?`<span class="ms" style="font-size:21px;color:${markColor};font-variation-settings:'FILL' 1">${markIcon}</span>`:''}
    </button>`;
  }).join('');

  const paletteHTML=S.queue.map((qi,idx)=>{
    const qq=questions()[qi];const a=S.answers[qq.id];const ansd=a!==undefined;
    const isCur=idx===S.qPos;const fl=!!S.flags[qq.id];
    let bg='var(--surface3)';
    if(S.mode==='study'&&ansd){bg=a===qq.answer?'var(--green)':'var(--red)';}
    else if(ansd){bg='var(--blue)';}
    if(fl)bg='var(--yellow)';
    return `<button onclick="Q.setQPos(${idx})" style="width:10px;height:10px;border-radius:50%;border:none;cursor:pointer;padding:0;flex:none;background:${bg};outline:${isCur?'2px solid var(--text)':'none'};outline-offset:2px"></button>`;
  }).join('');

  const explanationHTML=reveal?`
    <div style="margin-top:20px;border:1px solid var(--border);border-radius:14px;background:var(--surface);overflow:hidden;animation:fadeUp .3s ease">
      <div style="display:flex;align-items:center;gap:10px;padding:13px 18px;border-bottom:1px solid var(--border);background:var(--surface2)">
        <span class="ms" style="font-size:20px;color:var(--green);font-variation-settings:'FILL' 1">lightbulb</span>
        <span style="font-weight:700;font-size:14px;color:var(--text)">Explanation</span>
        <div style="flex:1"></div>
        <span style="font-weight:600;font-size:12.5px;color:var(--green);padding:4px 10px;border-radius:20px;background:var(--green-soft)">Answer: ${q.options.length<=2?esc(q.options[q.answer]):'ABCDE'[q.answer]}</span>
      </div>
      <p style="font-weight:400;font-size:15.5px;line-height:1.7;color:var(--muted);margin:0;padding:16px 18px">${esc(q.explanation)}</p>
    </div>`:'';

  const isLast=S.qPos===S.queue.length-1;

  return `
  ${renderQEditModals()}
  <div style="min-height:100vh;display:flex;flex-direction:column;background:var(--bg)">
    <div class="app-header" style="height:60px;flex:none;display:flex;align-items:center;gap:14px;padding:0 20px;background:var(--surface);border-bottom:1px solid var(--border)">
      <button onclick="Q.onExitSolver()" style="display:flex;align-items:center;gap:6px;height:38px;padding:0 13px;border:1px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text);font-weight:600;font-size:14px;cursor:pointer"><span class="ms" style="font-size:19px">close</span><span class="rlabel">Exit</span></button>
      <div style="min-width:0">
        <div style="font-weight:700;font-size:15px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(S.sessionLecture)}</div>
        <div style="font-weight:500;font-size:12px;color:var(--muted)">${esc(S.sessionSubject)} · ${modeLabel}</div>
      </div>
      <div style="flex:1"></div>
      <div style="font-weight:600;font-size:13px;color:var(--muted);white-space:nowrap">Q <span style="color:var(--text);font-weight:700">${S.qPos+1}</span>/${S.queue.length}</div>
      ${S.mode==='exam'?`<div style="display:flex;align-items:center;gap:7px;height:36px;padding:0 12px;border-radius:9px;background:var(--yellow-soft)"><span class="ms" style="font-size:18px;color:var(--yellow-ink)">timer</span><span id="timer-display" style="font-weight:700;font-size:14px;font-family:'JetBrains Mono';color:var(--yellow-ink)">${mm}:${ss2}</span></div>`:''}
      <button onclick="Q.onToggleTheme()" style="width:38px;height:38px;border:1px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center"><span class="ms" style="font-size:20px">${themeIcon}</span></button>
    </div>
    <div style="height:4px;flex:none;background:var(--border2)"><div style="height:100%;background:linear-gradient(90deg,var(--blue),var(--yellow));width:${progressPct}%;transition:width .3s"></div></div>

    <div style="flex:1;overflow:auto;display:flex;justify-content:center;padding:34px 20px 120px">
      <div style="width:100%;max-width:760px;animation:pop .22s ease both">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:16px">
          <span style="font-weight:700;font-size:12px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted)">${esc(q.tag)}</span>
          <div style="display:flex;align-items:center;gap:8px">
            ${isAdmin?`<button onclick="Q.openQEdit('${q.id}')" title="Edit this question" style="display:flex;align-items:center;gap:6px;height:36px;padding:0 13px;border:1.5px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text);font-weight:600;font-size:13.5px;cursor:pointer"><span class="ms" style="font-size:18px">edit</span><span class="rlabel">Edit</span></button>
            <button onclick="Q.askDeleteQuestion('${q.id}')" title="Remove this question" style="display:flex;align-items:center;justify-content:center;width:36px;height:36px;border:1.5px solid var(--border);border-radius:10px;background:var(--surface);color:var(--red);cursor:pointer"><span class="ms" style="font-size:18px">delete</span></button>`:''}
            <button onclick="Q.onFlag()" style="display:flex;align-items:center;gap:7px;height:36px;padding:0 14px;border:1.5px solid ${flagged?'var(--yellow)':'var(--border)'};border-radius:10px;background:${flagged?'var(--yellow-soft)':'var(--surface)'};color:${flagged?'var(--yellow-ink)':'var(--muted)'};font-weight:600;font-size:13.5px;cursor:pointer"><span class="ms" style="font-size:18px;font-variation-settings:'FILL' ${flagged?1:0}">flag</span>${flagged?'Flagged':'Flag'}</button>
          </div>
        </div>
        <h2 style="font-weight:600;font-size:23px;line-height:1.45;color:var(--text);letter-spacing:-.3px;margin:0 0 ${q.image?'18px':'24px'}">${esc(q.stem)}</h2>
        ${q.image?`<img src="${esc(q.image)}" alt="Question image" style="display:block;width:100%;max-width:480px;height:auto;border-radius:14px;border:1px solid var(--border);margin:0 0 24px"/>`:''}
        ${choicesHTML}
        ${explanationHTML}
      </div>
    </div>

    <div style="position:fixed;bottom:0;left:0;right:0;height:74px;display:flex;align-items:center;justify-content:center;gap:12px;padding:0 20px;background:var(--surface);border-top:1px solid var(--border)">
      <div style="width:100%;max-width:760px;display:flex;align-items:center;gap:10px">
        <button onclick="Q.prev()" style="display:flex;align-items:center;gap:6px;height:46px;padding:0 16px;border:1px solid var(--border);border-radius:11px;background:var(--surface);color:var(--text);font-weight:600;font-size:15px;cursor:pointer"><span class="ms" style="font-size:20px">arrow_back</span><span class="rlabel">Previous</span></button>
        <div style="flex:1;display:flex;align-items:center;gap:6px;justify-content:center;flex-wrap:wrap">${paletteHTML}</div>
        ${isLast
          ?`<button onclick="Q.onFinish()" style="display:flex;align-items:center;gap:7px;height:46px;padding:0 20px;border:none;border-radius:11px;background:var(--green);color:#fff;font-weight:700;font-size:15px;cursor:pointer">Finish<span class="ms" style="font-size:20px">check_circle</span></button>`
          :`<button onclick="Q.next()" style="display:flex;align-items:center;gap:6px;height:46px;padding:0 18px;border:none;border-radius:11px;background:var(--blue);color:#fff;font-weight:700;font-size:15px;cursor:pointer">Next<span class="ms" style="font-size:20px">arrow_forward</span></button>`}
      </div>
    </div>
  </div>`;
}

function renderApp(){
  const scr=S.screen;
  const dark=S.theme==='dark';
  const themeIcon=dark?'light_mode':'dark_mode';
  const themeLabel=dark?'Light mode':'Dark study mode';
  const map={dashboard:'dashboard',subjects:'subjects',lectures:'subjects',modeselect:'subjects',results:'subjects',analytics:'analytics',admin:'admin'};
  const curNav=map[scr]||'dashboard';
  const isGuest=S.role==='guest';
  const navDefs=[['dashboard','Dashboard','space_dashboard'],['subjects','Subjects','grid_view'],['analytics','Analytics','bar_chart'],...(isGuest?[]:[['admin','Admin','shield']])];

  const navHTML=navDefs.map(([k,label,icon])=>{
    const active=curNav===k;
    return `<button class="nav-btn" onclick="Q.go('${k}')" style="display:flex;align-items:center;gap:11px;width:100%;height:42px;padding:0 12px;border:none;border-radius:10px;background:${active?'var(--blue-soft)':'transparent'};color:${active?'var(--blue)':'var(--muted)'};font-weight:600;font-size:14px;cursor:pointer;margin-bottom:2px">

  const subj=subjects.find(s=>s.id===S.subjectId)||(subjects[0]||{id:'',name:'',initial:'?',tileBg:'var(--surface3)',tileFg:'var(--muted)',qLabel:'0',lectures:0,pct:0,acc:0,accLabel:'Not started'});

    modeselect:[S.testScope?S.testScope.label:lec.name,'Choose your practice mode'],
    results:['Session results',S.sessionLecture],
    analytics:['Analytics','Your performance over time'],
    admin:['Admin console','Manage students & the question bank'],
  };
  const tt=titles[scr]||['Square QBank',''];

  /* ── page content ── */
  let pageHTML='';

  if(scr==='dashboard'){
    const st=userStats();
    const last=(S.dbSessions||[])[0];
    const lastSubj=last?subjects.find(x=>x.id===last.subject_id):null;
    const topSubjects=subjects.slice(0,4);
    const stats=[
      {icon:'quiz',color:'var(--blue)',label:'Questions solved',value:fmt(st.answered),note:st.weekAnswered?('+'+fmt(st.weekAnswered)+' this week'):'No activity this week'},
      {icon:'target',color:'var(--green)',label:'Overall accuracy',value:st.accuracy==null?'—':st.accuracy+'%',note:st.answered?(fmt(st.answered)+' answered'):'No answers yet'},
      {icon:'history_edu',color:'var(--yellow-ink)',label:'Sessions done',value:fmt(st.completed),note:st.sessions?(fmt(st.sessions)+' started'):'None yet'},
      {icon:'flag',color:'var(--red)',label:'Flagged',value:fmt(st.flagged),note:'Saved for review'},
    ];
    const nonGuestHero = last
      ? `<div class="results-hero" style="display:flex;align-items:center;gap:24px;padding:26px 28px;border-radius:18px;background:linear-gradient(110deg,#13265a,#1f4aa8 55%,#2767e0);color:#fff;box-shadow:0 14px 40px rgba(39,103,224,.28);position:relative;overflow:hidden;margin-bottom:24px">
            <div style="position:absolute;right:-40px;top:-40px;width:220px;height:220px;border-radius:30px;border:14px solid rgba(243,184,39,.25);transform:rotate(18deg)"></div>
            <div style="flex:1;position:relative">
              <div style="font-weight:600;font-size:12.5px;letter-spacing:.5px;text-transform:uppercase;color:#a9c3f5;margin-bottom:8px">Pick up where you left off</div>
              <div style="font-weight:800;font-size:26px;letter-spacing:-.6px;margin-bottom:6px">${esc(last.label||'Last session')}</div>
              <div style="font-weight:500;font-size:14px;color:#cdddf9">${fmt(last.answered||0)}/${fmt(last.total_questions||0)} answered · ${esc(last.status)}</div>
            </div>
            <button onclick="${lastSubj?`Q.openSubject('${lastSubj.id}')`:'Q.goSubjects()'}" style="display:flex;align-items:center;gap:8px;height:50px;padding:0 24px;border:none;border-radius:13px;background:#fff;color:#1b4fb0;font-weight:800;font-size:15px;cursor:pointer;position:relative;white-space:nowrap"><span class="ms" style="font-size:22px">play_arrow</span>Practice</button>
          </div>`
      : `<div class="results-hero" style="display:flex;align-items:center;gap:24px;padding:26px 28px;border-radius:18px;background:linear-gradient(110deg,#13265a,#1f4aa8 55%,#2767e0);color:#fff;box-shadow:0 14px 40px rgba(39,103,224,.28);position:relative;overflow:hidden;margin-bottom:24px">
            <div style="position:absolute;right:-40px;top:-40px;width:220px;height:220px;border-radius:30px;border:14px solid rgba(243,184,39,.25);transform:rotate(18deg)"></div>
            <div style="flex:1;position:relative">
              <div style="font-weight:600;font-size:12.5px;letter-spacing:.5px;text-transform:uppercase;color:#a9c3f5;margin-bottom:8px">Let's get started</div>
              <div style="font-weight:800;font-size:26px;letter-spacing:-.6px;margin-bottom:6px">${esc(titles.dashboard[0])}</div>

            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
              <div style="font-weight:800;font-size:18px;color:var(--text)">${title}</div>
              <span class="ms" onclick="Q.closeTopicModal()" style="font-size:22px;color:var(--faint);cursor:pointer">close</span>
            </div>
            ${S.topicError?`<div style="background:var(--red-soft);color:var(--red);border-radius:10px;padding:10px 14px;font-weight:600;font-size:13px;margin-bottom:14px">${esc(S.topicError)}</div>`:''}
            ${parent?`<div style="font-weight:500;font-size:12.5px;color:var(--muted);margin-bottom:8px">Under <span style="color:var(--text);font-weight:700">${esc(parent)}</span></div>`:''}
            <label style="${lblCss}">${m.kind==='subject'?'Topic':'Subtopic'} name</label>
            <input id="topic-name" value="${esc(m.name||'')}" placeholder="${m.kind==='subject'?'e.g. Surgery':'e.g. Cardiology'}" style="${inCss}" onkeydown="if(event.key==='Enter')Q.onSaveTopic()">
            ${m.kind==='subject'?`<label style="${lblCss};margin-top:14px">Stage</label>
            <select id="topic-stage" style="${inCss}">
              ${[5,6].map(st=>`<option value="${st}" ${(m.stage||5)===st?'selected':''}>${st}th stage</option>`).join('')}
            </select>`:''}
            <div style="display:flex;gap:10px;margin-top:20px">
              <button onclick="Q.closeTopicModal()" style="flex:1;height:46px;border:1.5px solid var(--border);border-radius:12px;background:var(--surface);color:var(--text);font-weight:700;font-size:14px;cursor:pointer">Cancel</button>
              <button onclick="Q.onSaveTopic()" style="flex:2;height:46px;border:none;border-radius:12px;background:var(--blue);color:#fff;font-weight:700;font-size:14px;cursor:pointer;opacity:${S.topicSaving?.6:1}">${S.topicSaving?'Saving…':(m.mode==='rename'?'Save':'Add')}</button>
            </div>
          </div></div>`;
      })():'';

      const subjectCards=subjects.length?subjects.map(s=>{
        const lecs=S.dbLectures.filter(l=>l.subject_id===s.id).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
        const t=tile(s.hue||255);
        const lecRows=lecs.length?lecs.map(l=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 16px 10px 20px;border-top:1px solid var(--border2)">
            <span class="ms" style="font-size:16px;color:var(--faint)">subdirectory_arrow_right</span>
            <span style="font-weight:600;font-size:13.5px;color:var(--text)">${esc(l.name)}</span>
            <span style="font-weight:500;font-size:11.5px;color:var(--muted)">${fmt(qCountByLecture[l.id]||0)} MCQ${(qCountByLecture[l.id]||0)===1?'':'s'}</span>
            <div style="flex:1"></div>
            <button onclick="Q.openRenameSubtopic('${l.id}')" style="${miniBtn}"><span class="ms" style="font-size:15px">edit</span>Rename</button>
          </div>`).join(''):`<div style="padding:12px 20px;border-top:1px solid var(--border2);font-weight:500;font-size:12.5px;color:var(--muted)">No subtopics yet.</div>`;
        return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);overflow:hidden">
          <div style="display:flex;align-items:center;gap:12px;padding:14px 16px 14px 20px">
            <div style="width:34px;height:34px;border-radius:9px;background:${t.bg};color:${t.fg};display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex:none">${esc((s.name[0]||'?').toUpperCase())}</div>
            <div style="min-width:0">
              <div style="font-weight:800;font-size:15px;color:var(--text)">${esc(s.name)}</div>
              <div style="font-weight:500;font-size:11.5px;color:var(--muted)">${lecs.length} subtopic${lecs.length===1?'':'s'} · ${fmt(qCountBySubject[s.id]||0)} MCQs</div>
            </div>
            <div style="flex:1"></div>
            <button onclick="Q.openRenameTopic('${s.id}')" style="${miniBtn}"><span class="ms" style="font-size:15px">edit</span>Rename</button>
            <button onclick="Q.openAddSubtopic('${s.id}')" style="${miniBtn};border-color:var(--blue);color:var(--blue)"><span class="ms" style="font-size:15px">add</span>Subtopic</button>
          </div>
          ${lecRows}
        </div>`;
      }).join(''):`<div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:48px;text-align:center;color:var(--muted);font-weight:500;font-size:14px"><span class="ms" style="font-size:36px;display:block;margin-bottom:8px">category</span>No topics yet — click "New topic" to add one.</div>`;

      tabContent=`${topicModalHTML}
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
          <span style="font-weight:700;font-size:15px;color:var(--text)">Topics &amp; subtopics</span>
          <span style="font-weight:500;font-size:12.5px;color:var(--muted)">${fmt(subjects.length)} topics · ${fmt(S.dbLectures.length)} subtopics</span>
          <div style="flex:1"></div>
          <button onclick="Q.openAddTopic()" style="display:flex;align-items:center;gap:7px;height:40px;padding:0 16px;border:none;border-radius:10px;background:var(--blue);color:#fff;font-weight:700;font-size:13.5px;cursor:pointer"><span class="ms" style="font-size:19px">add</span>New topic</button>
        </div>
        <div style="display:flex;flex-direction:column;gap:14px">${subjectCards}</div>`;
    }

    pageHTML=`
    <div style="max-width:1080px;margin:0 auto;animation:fadeUp .35s ease both">
      <div class="grid-4" style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px">
        ${adminStats.map(s=>`<div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px 20px;box-shadow:var(--shadow)"><div style="display:flex;align-items:center;gap:9px;margin-bottom:10px"><span class="ms" style="font-size:20px;color:${s.color}">${s.icon}</span><span style="font-weight:600;font-size:13px;color:var(--muted)">${s.label}</span></div><div style="font-weight:800;font-size:28px;letter-spacing:-1px;color:var(--text)">${s.value}</div></div>`).join('')}
      </div>
      <div style="display:flex;gap:6px;padding:5px;background:var(--surface2);border:1px solid var(--border);border-radius:13px;width:max-content;margin-bottom:20px;max-width:100%;overflow:auto">
        ${tabs.map(([k,label])=>{const active=S.adminTab===k;return `<button onclick="Q.setAdminTab('${k}')" style="height:38px;padding:0 18px;border:none;border-radius:9px;white-space:nowrap;background:${active?'var(--surface)':'transparent'};color:${active?'var(--text)':'var(--muted)'};font-weight:700;font-size:13.5px;cursor:pointer;box-shadow:${active?'var(--shadow)':'none'}">${label}</button>`;}).join('')}
      </div>
      ${tabContent}
    </div>`;
  }

  return `
  <div style="display:flex;min-height:100vh">
    <aside class="app-sidebar" style="width:248px;flex:none;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;padding:20px 14px">
      <div class="brand-row" style="display:flex;align-items:center;gap:11px;padding:6px 8px 22px">
        <div style="width:30px;height:30px;border-radius:8px;padding:3px;background:linear-gradient(135deg,#3b82f6,#f3b827)"><div style="width:100%;height:100%;background:var(--surface);border-radius:5px"></div></div>
        <div style="font-weight:800;font-size:18px;letter-spacing:-.5px;color:var(--text)">Square<span style="color:var(--yellow-ink)"> QBank</span></div>
      </div>
      <div class="app-nav" style="display:flex;flex-direction:column;gap:2px">${navHTML}</div>
      <div style="flex:1"></div>
      <div class="side-foot" style="border-top:1px solid var(--border);padding-top:14px;margin-top:10px">
        <button onclick="Q.onToggleTheme()" style="width:100%;display:flex;align-items:center;gap:11px;height:42px;padding:0 12px;border:none;border-radius:10px;background:transparent;color:var(--text);font-weight:600;font-size:14px;cursor:pointer"><span class="ms" style="font-size:20px">${themeIcon}</span>${themeLabel}</button>
        ${isGuest
          ? `<div style="display:flex;align-items:center;gap:11px;padding:10px 12px;margin-top:4px;border-radius:10px;background:var(--surface2);border:1px solid var(--border)">
              <div style="width:34px;height:34px;border-radius:9px;background:var(--surface3);display:flex;align-items:center;justify-content:center"><span class="ms" style="font-size:20px;color:var(--faint)">person_off</span></div>
              <div style="min-width:0;flex:1"><div style="font-weight:700;font-size:13px;color:var(--text)">Guest</div><div style="font-weight:500;font-size:11px;color:var(--faint)">Progress not saved</div></div>
              <span onclick="Q.onLogout()" class="ms" style="font-size:20px;color:var(--faint);cursor:pointer" title="Sign in">login</span>
            </div>`
          : (()=>{
              const p=S.profile;
              const displayName=p?(p.full_name||p.username):'Student';
              const initial=(displayName[0]||'S').toUpperCase();
              const sub=p?(p.role==='admin'?`Administrator · ${p.username}`:`${p.stage}th stage · ${p.username}`):'';
              return `<div style="display:flex;align-items:center;gap:11px;padding:10px 12px;margin-top:4px;border-radius:10px">
                <div style="width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--blue),var(--yellow));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff">${esc(initial)}</div>
                <div style="min-width:0;flex:1"><div style="font-weight:700;font-size:13.5px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(displayName)}</div><div style="font-weight:500;font-size:11.5px;color:var(--muted)">${esc(sub)}</div></div>
                <span onclick="Q.onLogout()" class="ms" style="font-size:20px;color:var(--faint);cursor:pointer">logout</span>
              </div>`;
            })()}
      </div>
    </aside>

    <main class="app-main" style="flex:1;min-width:0;display:flex;flex-direction:column">
      <header class="app-header" style="height:66px;flex:none;display:flex;align-items:center;gap:14px;padding:0 30px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5">
        <div style="min-width:0">
          <div style="font-weight:800;font-size:19px;letter-spacing:-.5px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(tt[0])}</div>
          <div style="font-weight:500;font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(tt[1])}</div>
        </div>
        <div style="flex:1"></div>
        <div class="header-search" style="display:flex;align-items:center;gap:9px;height:42px;padding:0 14px;border:1px solid var(--border);border-radius:11px;background:var(--surface2);width:300px;max-width:34vw">
          <span class="ms" style="font-size:20px;color:var(--faint)">search</span>
          <input placeholder="Search subjects, lectures, topics…" style="border:none;background:transparent;outline:none;font-weight:500;font-size:14px;color:var(--text);flex:1;min-width:0;font-family:Figtree">
        </div>
        <button class="mobile-only" onclick="Q.onToggleTheme()" style="width:42px;height:42px;border:1px solid var(--border);border-radius:11px;background:var(--surface);color:var(--text);cursor:pointer;align-items:center;justify-content:center"><span class="ms" style="font-size:21px">${themeIcon}</span></button>
        ${isGuest
          ? `<button onclick="Q.onLogout()" style="display:flex;align-items:center;gap:8px;height:42px;padding:0 16px;border:1.5px solid var(--yellow);border-radius:11px;background:var(--yellow-soft);color:var(--yellow-ink);font-weight:700;font-size:14px;cursor:pointer;white-space:nowrap"><span class="ms" style="font-size:19px">login</span><span class="rlabel">Sign in</span></button>`
          : `<button onclick="Q.goSubjects()" style="display:flex;align-items:center;gap:8px;height:42px;padding:0 16px;border:none;border-radius:11px;background:var(--blue);color:#fff;font-weight:700;font-size:14px;cursor:pointer;white-space:nowrap"><span class="ms" style="font-size:19px">grid_view</span><span class="rlabel">Practice</span></button>`}
      </header>

      <div class="content-pad" style="flex:1;overflow:auto;padding:30px">
        ${isGuest?`<div style="display:flex;align-items:center;gap:12px;padding:12px 18px;border-radius:13px;background:var(--yellow-soft);border:1.5px solid var(--yellow);margin-bottom:22px">
          <span class="ms" style="font-size:20px;color:var(--yellow-ink)">info</span>
          <span style="font-weight:500;font-size:13.5px;color:var(--yellow-ink);flex:1">You're browsing as a <b>guest</b> — your progress and answers won't be saved.</span>
          <button onclick="Q.onLogout()" style="height:34px;padding:0 14px;border:none;border-radius:8px;background:var(--yellow-ink);color:#fff;font-weight:700;font-size:13px;cursor:pointer">Sign in</button>
        </div>`:''}

        ${pageHTML}
      </div>
    </main>
  </div>`;
}

/* ── main render ── */
function render(){
  const root=document.getElementById('app');
  root.setAttribute('data-theme', S.theme);
  root.style.cssText='min-height:100vh;background:var(--bg);color:var(--text);font-family:Figtree,sans-serif;-webkit-font-smoothing:antialiased';

  if(S.screen==='stage') root.innerHTML=renderStage();
  else if(S.screen==='login') root.innerHTML=renderLogin();
  else if(S.screen==='solver') root.innerHTML=renderSolver();                    // in-progress quiz (incl. 6th stage)
  else if(S.stage===6 && S.role!=='admin' && S.screen==='sixresult') root.innerHTML=renderSixResult();
  else if(S.stage===6 && S.role!=='admin') root.innerHTML=(S.sixthMode==='wizari'?renderQuiz():S.sixthMode==='mcq'?renderMcqSoon():renderChecklist());   // 6th stage: checklist + Wizari MCQs (free) + MCQ (soon)
  else root.innerHTML=renderApp();
}

startTimer();
</script>
</body>
</html>
