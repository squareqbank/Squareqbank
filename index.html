<style>
:root{
  --bg:#eceef2;--surface:#ffffff;--surface2:#f6f7f9;--surface3:#eef1f5;
  --text:#0f1118;--muted:#646e7e;--faint:#9aa3b1;--border:#e4e7ec;--border2:#eef0f3;
  --blue:#2767e0;--blue-ink:#1b4fb0;--blue-soft:#e8f0fd;

  --shadow-lg:0 10px 44px rgba(16,20,30,.14);
}
[data-theme="dark"]{
  --bg:#090a0e;--surface:#14161d;--surface2:#1a1d26;--surface3:#21252f;
  --text:#eef0f4;--muted:#9aa3b2;--faint:#6b7383;--border:#272b36;--border2:#1d212b;

*{box-sizing:border-box}
html,body{margin:0;padding:0}
::selection{background:var(--blue);color:#fff}

::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px;border:2px solid transparent;background-clip:content-box}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes pop{from{opacity:0;transform:scale(.98)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
.mobile-only{display:none!important}
@media(max-width:1120px){.grid-4{grid-template-columns:repeat(2,1fr)!important}}
@media(max-width:900px){
  .app-sidebar{position:fixed!important;top:auto!important;bottom:0!important;left:0!important;right:0!important;width:100%!important;height:60px!important;flex-direction:row!important;padding:0 6px!important;border-right:none!important;border-top:1px solid var(--border)!important;z-index:40}
  .brand-row{display:none!important}.side-foot{display:none!important}
  .app-nav{flex-direction:row!important;width:100%!important;justify-content:space-around!important;gap:0!important}
  .nav-btn{flex-direction:column!important;height:auto!important;gap:2px!important;padding:5px 4px!important;width:auto!important;margin:0!important}
  .nav-label{font-size:10px!important;font-weight:600}
  .nav-btn .ms{font-size:23px!important}
  .app-main{padding-bottom:60px!important}
  .content-pad{padding:18px!important}
  .header-search{display:none!important}
  .mobile-only{display:flex!important}
  .grid-3{grid-template-columns:1fr!important}
  .grid-2{grid-template-columns:1fr!important}
  .grid-4{grid-template-columns:repeat(2,1fr)!important}
  .mode-grid{grid-template-columns:1fr!important}
  .an-grid{grid-template-columns:1fr!important}
  .results-hero{flex-direction:column!important;text-align:center;gap:18px!important}
  .login-grid{grid-template-columns:1fr!important}
  .login-hero{display:none!important}
  .app-header{padding:0 18px!important}
  .rlabel{display:none!important}
}
@media(max-width:520px){.grid-4{grid-template-columns:1fr 1fr!important}}
button{font-family:Figtree,sans-serif}

<body>
<div id="app"></div>
<script>
/* ── Supabase ── */
const SUPABASE_URL  = 'https://dxpempiqkdemoluscxee.supabase.co';
const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR4cGVtcGlxa2RlbW9sdXNjeGVlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MDAzMDQsImV4cCI6MjA5NzM3NjMwNH0.WEZnUgnhi0UZrkkijcfaLqu_VcVzSlaxmoOodHUHt4A';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* device fingerprint (stable across reloads) */
function getDeviceFP(){
  const nav = [navigator.userAgent, navigator.language, screen.width+'x'+screen.height, new Date().getTimezoneOffset()].join('|');
  let h=0; for(let i=0;i<nav.length;i++){h=Math.imul(31,h)+nav.charCodeAt(i)|0;} return 'fp_'+(h>>>0).toString(36);
}

/* ── state ── */
const S = {
  theme:'light', screen:'login', role:'user',
  profile:null,          // {id, username, full_name, role, stage}
  dbQuestions:[],        // questions loaded from Supabase
  dbSubjects:[],         // subjects loaded from Supabase
  dbLectures:[],         // lectures loaded from Supabase
  dbUsers:[],            // admin: students list
  activeSessionId:null,  // current session UUID
  deviceStatus:'ok',     // 'ok' | 'registered' | 'locked'
  authError:'', loginLoading:false,
  subjectId:'medicine', lectureId:'cardio', lectureName:'Cardiology',
  sessionSubject:'Medicine', sessionLecture:'Cardiology',
  mode:'study', queue:[0,1,2,3,4,5,6,7], qPos:0,
  answers:{}, flags:{}, examLeft:1500,
  adminTab:'users', importing:false, importPct:0, importDone:false,
  showCreateModal:false, createError:'', createLoading:false,
  showBulkModal:false, bulkText:'', bulkResults:[], bulkLoading:false,
};

let _timerInterval = null;
let _importInterval = null;

/* ── data ── */
function subjectsData(){
  if(S.dbSubjects.length){
    return S.dbSubjects.map(s=>{
      const lecs=S.dbLectures.filter(l=>l.subject_id===s.id);
      return {id:s.id,name:s.name,hue:s.hue,category:s.category||s.name,lectures:lecs.length||0,q:0,pct:0,acc:0};
    });
  }
  return[];
}

function subjectsByCategory(){
  const all=subjectsData();
  const order=['Medicine','Surgery','ENT','Ophthalmology','Orthopedics','Gynaecology','Psychiatry','Pediatric','Dermatology','Medical Ethics'];
  const map={};
  all.forEach(s=>{
    const cat=s.category||s.name;
    if(!map[cat]) map[cat]=[];
    map[cat].push(s);
  });
  const result=[];
  order.forEach(cat=>{if(map[cat]) result.push({cat,subjects:map[cat]});});
  Object.keys(map).forEach(cat=>{if(!order.includes(cat)) result.push({cat,subjects:map[cat]});});
  return result;
}

function lecturesFor(id){
  if(S.dbLectures.length){
    return S.dbLectures
      .filter(l=>l.subject_id===id)
      .sort((a,b)=>a.sort_order-b.sort_order)
      .map(l=>({id:l.id,name:l.name,q:0,pct:0,acc:0}));
  }
  return [];
}

const FALLBACK_QUESTIONS = [
  {id:'c1',tag:'Cardiology',stem:'A 58-year-old man presents with crushing central chest pain radiating to the left arm for 2 hours. ECG shows ST-elevation in leads II, III and aVF. Which coronary artery is most likely occluded?',options:['Left anterior descending','Left circumflex','Right coronary artery','Left main stem','Diagonal branch'],answer:2,explanation:'ST-elevation in the inferior leads (II, III, aVF) indicates an inferior STEMI, most commonly caused by occlusion of the right coronary artery in a right-dominant circulation.'},
  {id:'c2',tag:'Cardiology',stem:'Which of the following is the single most appropriate immediate drug to give a patient with an acute ST-elevation myocardial infarction?',options:['Aspirin 300 mg','Warfarin','Furosemide','Digoxin','Amiodarone'],answer:0,explanation:'Immediate chewed aspirin 300 mg is given as soon as ACS is suspected; it reduces mortality through its antiplatelet effect and is the priority first drug.'},
  {id:'c3',tag:'Cardiology',stem:'A 72-year-old woman with atrial fibrillation has a CHA₂DS₂-VASc score of 3. What is the recommended long-term management to reduce stroke risk?',options:['No antithrombotic therapy','Aspirin alone','Oral anticoagulation','Clopidogrel alone','LMWH for one week only'],answer:2,explanation:'A CHA₂DS₂-VASc score of ≥2 warrants long-term oral anticoagulation (e.g. a DOAC or warfarin). Antiplatelet therapy is no longer recommended for stroke prevention in AF.'},
  {id:'c4',tag:'Cardiology',stem:'A pansystolic murmur best heard at the apex and radiating to the axilla is most characteristic of which valvular lesion?',options:['Aortic stenosis','Mitral regurgitation','Mitral stenosis','Aortic regurgitation','Pulmonary stenosis'],answer:1,explanation:'Mitral regurgitation produces a pansystolic murmur loudest at the apex that classically radiates to the axilla.'},
  {id:'c5',tag:'Cardiology',stem:'What is the most common cause of mitral stenosis worldwide?',options:['Congenital valve disease','Infective endocarditis','Rheumatic heart disease','Degenerative calcification','Carcinoid syndrome'],answer:2,explanation:'Rheumatic heart disease, a sequela of streptococcal rheumatic fever, remains by far the most common cause of mitral stenosis globally.'},
  {id:'c6',tag:'Cardiology',stem:'A 70-year-old man reports exertional syncope, angina and breathlessness. Examination reveals an ejection systolic murmur radiating to the carotids with a slow-rising pulse. The most likely diagnosis is:',options:['Mitral regurgitation','Aortic stenosis','Tricuspid regurgitation','Ventricular septal defect','Mitral valve prolapse'],answer:1,explanation:'The triad of syncope, angina and dyspnoea with an ejection systolic murmur radiating to the carotids and a slow-rising pulse is classic for severe aortic stenosis.'},
  {id:'c7',tag:'Cardiology',stem:'Which class of drug is first-line for symptom control in chronic stable angina?',options:['Beta-blocker','Warfarin','Digoxin','Furosemide','Spironolactone'],answer:0,explanation:'Beta-blockers (or rate-limiting calcium-channel blockers if beta-blockers are contraindicated) are first-line anti-anginal therapy for symptom control.'},
  {id:'c8',tag:'Cardiology',stem:'Which ECG finding is the earliest and most characteristic feature of hyperkalaemia?',options:['U waves','Tall, tented T waves','ST depression','Prolonged QT interval','Delta wave'],answer:1,explanation:'Tall, peaked (tented) T waves are the earliest characteristic ECG change of hyperkalaemia, later followed by widened QRS and loss of P waves.'},
];

function questions(){
  // DB questions take priority; map DB row shape → app shape
  if(S.dbQuestions.length){
    return S.dbQuestions.map(q=>({
      id: q.id,
      tag: q.tag || q.lecture_id,
      stem: q.stem,
      options:[q.option_a,q.option_b,q.option_c,q.option_d,q.option_e],
      answer: q.answer,
      explanation: q.explanation||'',
    }));
  }
  return FALLBACK_QUESTIONS;
}

/* ── helpers ── */
function fmt(n){return (''+n).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function tile(hue){
  return S.theme==='dark'
    ?{bg:'oklch(0.30 0.055 '+hue+')',fg:'oklch(0.80 0.12 '+hue+')'}
    :{bg:'oklch(0.95 0.045 '+hue+')',fg:'oklch(0.52 0.14 '+hue+')'};
}
function curQ(){const qs=questions();return qs[S.queue[S.qPos]]||qs[0];}
function seedAnswers(){const qs=questions();const a={};[0,1,2,3,4].forEach((i,k)=>{a[qs[i].id]=(k===2?(qs[i].answer+1)%5:qs[i].answer);});return a;}

/* ── actions ── */
function setState(patch){
  if(typeof patch==='function') patch=patch(S);
  Object.assign(S,patch);
  render();
}

window.Q={
  go(k){setState({screen:k==='subjects'?'subjects':k==='analytics'?'analytics':k==='admin'?'admin':'dashboard'});},
  goDashboard(){setState({screen:'dashboard'});},
  goSubjects(){setState({screen:'subjects'});},
  openSubject(id){setState({subjectId:id,screen:'lectures'});},
  openLecture(id,name){setState({lectureId:id,lectureName:name,screen:'modeselect'});},
  onBackToLectures(){setState({screen:'lectures'});},
  async onLogin(){
    const usernameEl = document.getElementById('login-username');
    const passwordEl = document.getElementById('login-password');
    const username   = usernameEl ? usernameEl.value.trim() : '';
    const password   = passwordEl ? passwordEl.value : '';
    if(!username || !password){ setState({authError:'Enter username and password.'}); return; }
    setState({authError:'', loginLoading:true});
    try {
      const email = username + '@squareqbank.local';
      const {data, error} = await sb.auth.signInWithPassword({email, password});
      if(error){ setState({authError:'Invalid username or password.', loginLoading:false}); return; }
      await DB.afterLogin(data.user);
    } catch(e) {
      setState({authError:'Connection error. Please try again.', loginLoading:false});
    }
  },
  onGuest(){setState({screen:'dashboard',role:'guest',profile:null,answers:{},flags:{},qPos:0,authError:''});},
  async onLogout(){
    if(S.role!=='guest') await sb.auth.signOut();
    setState({screen:'login',role:'user',profile:null,answers:{},flags:{},qPos:0,activeSessionId:null,authError:'',dbQuestions:[],dbUsers:[]});
  },
  onToggleTheme(){setState({theme:S.theme==='light'?'dark':'light'});},
  onResume(){
    const qs=questions();
    setState({subjectId:'medicine',lectureId:'cardio',lectureName:'Cardiology',
      sessionSubject:'Medicine',sessionLecture:'Cardiology',
      mode:'study',queue:qs.map((_,i)=>i),qPos:5,answers:seedAnswers(),flags:{[qs[1].id]:true},screen:'solver'});
  },
  onRandom(){
    const qs=questions();
    const idx=qs.map((_,i)=>i).sort(()=>Math.random()-0.5);
    setState({mode:'exam',queue:idx,qPos:0,answers:{},flags:{},examLeft:2400,
      sessionSubject:'All subjects',sessionLecture:'Random mixed exam',screen:'solver'});
  },
  onReviewWrong(){
    const qs=questions();
    let answers=S.answers;if(Object.keys(answers).length===0)answers=seedAnswers();
    const wrong=qs.map((q,i)=>({q,i})).filter(x=>{const a=answers[x.q.id];return a!==undefined&&a!==x.q.answer;}).map(x=>x.i);
    setState({answers,mode:'study',queue:wrong.length?wrong:qs.map((_,i)=>i),qPos:0,
      sessionSubject:'Review',sessionLecture:'Incorrect questions',screen:'solver'});
  },
  onReviewFlagged(){
    const qs=questions();
    let flags=S.flags,answers=S.answers;
    if(Object.keys(flags).filter(k=>flags[k]).length===0){flags={[qs[1].id]:true,[qs[4].id]:true,[qs[6].id]:true};if(Object.keys(answers).length===0)answers=seedAnswers();}
    const fl=qs.map((q,i)=>({q,i})).filter(x=>flags[x.q.id]).map(x=>x.i);
    setState({flags,answers,mode:'study',queue:fl.length?fl:qs.map((_,i)=>i),qPos:0,
      sessionSubject:'Review',sessionLecture:'Flagged questions',screen:'solver'});
  },
  async startSession(mode){
    // load lecture questions from DB if authenticated
    if(S.profile) await DB.loadQuestions(S.lectureId);
    const qs=questions();
    const subj=subjectsData().find(s=>s.id===S.subjectId);
    const subjName=subj?subj.name:'Medicine';
    const sessionId=await DB.startSession(mode, S.lectureName, S.lectureId, S.subjectId, qs.length);
    setState({mode,queue:qs.map((_,i)=>i),qPos:0,answers:{},examLeft:1500,
      sessionSubject:subjName,sessionLecture:S.lectureName,
      activeSessionId:sessionId,screen:'solver'});
  },
  onStartStudy(){Q.startSession('study');},
  onStartExam(){Q.startSession('exam');},
  onRetry(){Q.startSession('study');},
  onExitSolver(){setState({screen:S.subjectId?'lectures':'dashboard'});},
  onFinish(){DB.completeSession();setState({screen:'results'});},
  choose(i){
    const q=curQ();const a={...S.answers};
    if(S.mode==='study'&&a[q.id]!==undefined)return;
    a[q.id]=i;setState({answers:a});
  },
  next(){setState(s=>({qPos:Math.min(s.queue.length-1,s.qPos+1)}));},
  prev(){setState(s=>({qPos:Math.max(0,s.qPos-1)}));},
  setQPos(i){setState({qPos:i});},
  onFlag(){const q=curQ();const f={...S.flags};f[q.id]=!f[q.id];setState({flags:f});DB.toggleFlag(q.id);},
  setAdminTab(k){setState({adminTab:k});},
  openCreateModal(){setState({showCreateModal:true,createError:'',createLoading:false});},
  closeCreateModal(){setState({showCreateModal:false,createError:'',createLoading:false});},
  async onCreateStudent(){
    const u=document.getElementById('cu-username')?.value.trim();
    const n=document.getElementById('cu-fullname')?.value.trim();
    const p=document.getElementById('cu-password')?.value;
    const s=parseInt(document.getElementById('cu-stage')?.value||'5');
    if(!u||!n||!p){setState({createError:'All fields required.'});return;}
    setState({createLoading:true,createError:''});
    const res=await DB.createStudent(u,n,p,s);
    if(res.error){setState({createLoading:false,createError:res.error});return;}
    setState({showCreateModal:false,createLoading:false,createError:''});
  },
  openBulkModal(){setState({showBulkModal:true,bulkText:'',bulkResults:[],bulkLoading:false});},
  closeBulkModal(){setState({showBulkModal:false,bulkText:'',bulkResults:[],bulkLoading:false});},
  async resetDevice(userId){await DB.resetDevice(userId);},
  async onBulkCreate(){
    const raw=document.getElementById('bulk-csv')?.value.trim();
    if(!raw){return;}
    // parse lines: username,full name,password,stage(optional)
    const rows=raw.split('\n').map(l=>l.trim()).filter(l=>l&&!l.startsWith('#'));
    const students=rows.map(l=>{const[username,full_name,password,stage]=l.split(',').map(x=>x?.trim());return{username,full_name,password,stage:parseInt(stage)||5};}).filter(r=>r.username&&r.full_name&&r.password);
    if(!students.length){return;}
    setState({bulkLoading:true,bulkResults:[]});
    const {data,error}=await sb.rpc('admin_create_students',{p_students:students});
    if(error){setState({bulkLoading:false,bulkResults:[{username:'Error',status:'error',error:error.message}]});return;}
    await DB.loadUsers();
    setState({bulkLoading:false,bulkResults:data||[]});
  },
  onImport(){
    if(S.importing||S.importDone)return;
    setState({importing:true,importPct:0,importDone:false});
    clearInterval(_importInterval);
    _importInterval=setInterval(()=>{
      const p=Math.min(100,S.importPct+9);
      if(p>=100){clearInterval(_importInterval);setState({importPct:100,importDone:true});}
      else setState({importPct:p});
    },170);
  },
};

/* ── DB layer ── */
const DB = {

  async afterLogin(user){
    const {data:prof, error:profErr} = await sb.from('profiles').select('*').eq('id', user.id).single();
    if(profErr || !prof){ setState({authError:'Profile not found. Contact administrator.', loginLoading:false}); await sb.auth.signOut(); return; }
    if(!prof.is_active){ setState({authError:'Account is deactivated. Contact administrator.', loginLoading:false}); await sb.auth.signOut(); return; }

    // device lock check (non-fatal — if it errors, continue).
    // Admins are exempt: they manage from multiple devices.
    if(prof.role !== 'admin'){
      try {
        const fp = getDeviceFP();
        const {data:devRes} = await sb.rpc('lock_device', {p_fp: fp});
        if(devRes?.status === 'locked'){
          await sb.auth.signOut();
          setState({authError:'This account is locked to another device. Contact your administrator to reset.', loginLoading:false});
          return;
        }
      } catch(_){}
    }

    // load data in parallel — failures are non-fatal
    await Promise.allSettled([
      DB.loadSubjectsAndLectures(),
      DB.loadQuestions(),
      prof.role === 'admin' ? DB.loadUsers() : Promise.resolve(),
      DB.loadFlags(user.id),
    ]);

    setState({
      profile: prof,
      role: prof.role === 'admin' ? 'admin' : 'user',
      screen: 'dashboard',
      loginLoading: false,
      answers:{}, flags: S.flags, qPos:0, authError:'',
    });
  },

  async loadSubjectsAndLectures(){
    const {data:subjects} = await sb.from('subjects').select('*').order('sort_order');
    const {data:lectures} = await sb.from('lectures').select('*').order('sort_order');
    setState({dbSubjects: subjects||[], dbLectures: lectures||[]});
  },

  async loadQuestions(lectureId){
    let q = sb.from('questions').select('*').eq('is_active', true);
    if(lectureId) q = q.eq('lecture_id', lectureId);
    const {data} = await q.order('created_at');
    setState({dbQuestions: data||[]});
  },

  async loadFlags(userId){
    const {data} = await sb.from('question_flags').select('question_id').eq('user_id', userId);
    const flags = {};
    (data||[]).forEach(r=>{ flags[r.question_id]=true; });
    setState({flags});
  },

  async toggleFlag(questionId){
    if(!S.profile) return; // guest: local only
    const flagged = S.flags[questionId];
    if(flagged){
      await sb.from('question_flags').delete().match({user_id:S.profile.id, question_id:questionId});
    } else {
      await sb.from('question_flags').upsert({user_id:S.profile.id, question_id:questionId});
    }
  },

  async startSession(mode, label, lectureId, subjectId, totalQ){
    if(!S.profile) return null;
    const {data} = await sb.from('sessions').insert({
      user_id: S.profile.id,
      subject_id: subjectId||S.subjectId,
      lecture_id: lectureId||S.lectureId,
      mode, label, status:'active', total_questions: totalQ,
    }).select().single();
    return data?.id || null;
  },

  async saveAnswer(questionId, selected, isCorrect){
    if(!S.activeSessionId || !S.profile) return;
    await sb.from('session_answers').insert({
      session_id: S.activeSessionId,
      question_id: questionId,
      selected, is_correct: isCorrect,
    });
    // update session counts
    await sb.from('sessions').update({
      answered: Object.keys(S.answers).length,
      correct: Object.values(S.answers).filter((a,i)=>{
        const q=questions()[S.queue[i]]; return q&&a===q.answer;
      }).length,
    }).eq('id', S.activeSessionId);
  },

  async completeSession(){
    if(!S.activeSessionId) return;
    const qs=questions(); let correct=0,answered=0;
    qs.forEach(q=>{const a=S.answers[q.id];if(a!==undefined){answered++;if(a===q.answer)correct++;}});
    await sb.from('sessions').update({
      status:'completed', completed_at: new Date().toISOString(),
      answered, correct,
    }).eq('id', S.activeSessionId);
    setState({activeSessionId:null});
  },

  async loadUsers(){
    const {data} = await sb.from('profiles').select('*').eq('role','student').order('full_name');
    setState({dbUsers: data||[]});
  },

  async createStudent(username, fullName, password, stage=5){
    const {data, error} = await sb.rpc('admin_create_student',{
      p_username: username, p_full_name: fullName, p_password: password, p_stage: stage,
    });
    if(error) return {error: error.message};
    await DB.loadUsers();
    return {id: data?.id, status: data?.status};
  },

  async resetDevice(userId){
    const {error} = await sb.rpc('admin_reset_device',{p_user_id: userId});
    if(!error) await DB.loadUsers();
    return !error;
  },
};

/* ── boot: restore session ── */
render(); // show login immediately — don't wait for async session check

let _restoring = false;

sb.auth.onAuthStateChange((event, session) => {
  // Only handle session restore on page refresh — not during active login
  // (login flow is handled directly in Q.onLogin to avoid double-calling DB.afterLogin).
  // IMPORTANT: supabase-js holds a Web Lock for the duration of this callback, so
  // awaiting any other supabase call here (as DB.afterLogin does) deadlocks the client
  // and hangs every subsequent auth/DB request — the "spinner forever" bug. Defer the
  // work with setTimeout so it runs after the callback returns and the lock is released.
  if(event === 'SIGNED_IN' && session && S.screen === 'login' && !S.loginLoading && !_restoring){
    _restoring = true;
    setTimeout(async () => {
      try { await DB.afterLogin(session.user); } finally { _restoring = false; }
    }, 0);
  }
});

(async()=>{
  const {data:{session}} = await sb.auth.getSession();
  if(session && S.screen === 'login' && !S.loginLoading && !_restoring){
    _restoring = true;
    try { await DB.afterLogin(session.user); } finally { _restoring = false; }
  }
})();

/* ── timer ── */
function startTimer(){
  clearInterval(_timerInterval);
  _timerInterval=setInterval(()=>{
    if(S.screen==='solver'&&S.mode==='exam'&&S.examLeft>0){
      S.examLeft=Math.max(0,S.examLeft-1);
      // only update timer display
      const el=document.getElementById('timer-display');
      if(el){
        const mm=String(Math.floor(S.examLeft/60)).padStart(2,'0');
        const ss=String(S.examLeft%60).padStart(2,'0');
        el.textContent=mm+':'+ss;
      }
    }
  },1000);
}

/* ── keyboard ── */
document.addEventListener('keydown',e=>{
  if(S.screen!=='solver')return;
  if(e.key>='1'&&e.key<='5'){Q.choose(+e.key-1);}
  else if(e.key==='ArrowRight'){Q.next();}
  else if(e.key==='ArrowLeft'){Q.prev();}
  else if(e.key==='f'||e.key==='F'){Q.onFlag();}
});

        <button class="mobile-only" onclick="Q.onToggleTheme()" style="width:42px;height:42px;border:1px solid var(--border);border-radius:11px;background:var(--surface);color:var(--text);cursor:pointer;align-items:center;justify-content:center"><span class="ms" style="font-size:21px">${themeIcon}</span></button>
        ${isGuest
          ? `<button onclick="Q.onLogout()" style="display:flex;align-items:center;gap:8px;height:42px;padding:0 16px;border:1.5px solid var(--yellow);border-radius:11px;background:var(--yellow-soft);color:var(--yellow-ink);font-weight:700;font-size:14px;cursor:pointer;white-space:nowrap"><span class="ms" style="font-size:19px">login</span><span class="rlabel">Sign in</span></button>`
          : `<button onclick="Q.onResume()" style="display:flex;align-items:center;gap:8px;height:42px;padding:0 16px;border:none;border-radius:11px;background:var(--blue);color:#fff;font-weight:700;font-size:14px;cursor:pointer;white-space:nowrap"><span class="ms" style="font-size:19px">play_arrow</span><span class="rlabel">Resume</span></button>`}
      </header>

      <div class="content-pad" style="flex:1;overflow:auto;padding:30px">
        ${isGuest?`<div style="display:flex;align-items:center;gap:12px;padding:12px 18px;border-radius:13px;background:var(--yellow-soft);border:1.5px solid var(--yellow);margin-bottom:22px">
          <span class="ms" style="font-size:20px;color:var(--yellow-ink)">info</span>
          <span style="font-weight:500;font-size:13.5px;color:var(--yellow-ink);flex:1">You're browsing as a <b>guest</b> — your progress and answers won't be saved.</span>
          <button onclick="Q.onLogout()" style="height:34px;padding:0 14px;border:none;border-radius:8px;background:var(--yellow-ink);color:#fff;font-weight:700;font-size:13px;cursor:pointer">Sign in</button>
        </div>`:''}

        ${pageHTML}
      </div>
    </main>
  </div>`;
}

/* ── main render ── */
function render(){
  const root=document.getElementById('app');
  root.setAttribute('data-theme', S.theme);
  root.style.cssText='min-height:100vh;background:var(--bg);color:var(--text);font-family:Figtree,sans-serif;-webkit-font-smoothing:antialiased';

  if(S.screen==='login') root.innerHTML=renderLogin();
  else if(S.screen==='solver') root.innerHTML=renderSolver();
  else root.innerHTML=renderApp();
}

startTimer();
</script>
</body>
</html>
